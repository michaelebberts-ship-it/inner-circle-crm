<!DOCTYPE html>
<html lang="en">
<head>

<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body,#root{height:100%;font-family:'Nunito Sans',sans-serif}

@keyframes slideIn{from{transform:translateX(100%)}to{transform:translateX(0)}}
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-thumb{background:#E0D5CC;border-radius:10px}
</style>

<body>
<div id="root"><div style="height:100vh;display:flex;align-items:center;justify-content:center;font-size:18px;color:#9B9B9B;font-family:'Nunito',sans-serif">🔥 Loading…</div></div>
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore,collection,doc,onSnapshot,setDoc,updateDoc,query,serverTimestamp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const app = initializeApp({
  apiKey:"AIzaSyDINHNV1Ze3QfhXwBPwe22LnUe-xxnU-n4",
  authDomain:"inner-circle-crm.firebaseapp.com",
  projectId:"inner-circle-crm",
  storageBucket:"inner-circle-crm.firebasestorage.app",
  messagingSenderId:"805498964211",
  appId:"1:805498964211:web:be124fa6606b7bc2010f86"
});
const db = getFirestore(app);
const FIXED_UID = "owner-inner-circle-crm";

const GROUPS = [{id:"all",label:"Everyone",icon:"🌐"},{id:"bbq",label:"BBQ Team",icon:"🍖"},{id:"friends",label:"Close Friends",icon:"🍺"},{id:"kids",label:"Kids' Parents",icon:"⚽"},{id:"family",label:"Family",icon:"🏡"}];
const TAG_META = {bbq:{label:"🍖 BBQ",bg:"#FFF3E0",col:"#E65100"},friends:{label:"🍺 Friends",bg:"#E8F5E9",col:"#2E7D32"},kids:{label:"⚽ Kids",bg:"#E3F2FD",col:"#1565C0"},family:{label:"🏡 Family",bg:"#FCE4EC",col:"#880E4F"},work:{label:"💼 Work",bg:"#F3E5F5",col:"#6A1B9A"}};
const COLORS = ["#FF6B35","#3498DB","#2ECC71","#9B59B6","#E91E63","#F39C12","#1ABC9C"];
const OCCASIONS = ["🎂 Birthday","🎄 Christmas","🎁 Holiday","👨‍👧 Father's Day","👩‍👧 Mother's Day","🎓 Graduation","🏠 Housewarming","💍 Wedding","⭐ Just because"];

let S = {
  contacts:[],syncStatus:"synced",
  view:"dashboard",group:"all",
  detail:null,showAdd:false,
  addColor:COLORS[0],addTags:[],
  addOccasion:"🎂 Birthday",
  draftText:null,draftLoading:false,
  noteAdding:false,giftAdding:false,giftGenerating:false,
  showEdit:false,editColor:COLORS[0],editTags:[],
  unsub:null
};

// helpers
function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2);}
function escH(s){return String(s).replace(/&/g,"&amp;").replace(/"/g,"&quot;").replace(/</g,"&lt;").replace(/>/g,"&gt;");}
function tod(){return new Date().toISOString().slice(0,10);}
function daysSince(d){if(!d)return 999;return Math.floor((Date.now()-new Date(d).getTime())/86400000);}
function dbu(b){if(!b)return null;const dt=new Date(b);const n=new Date();const nx=new Date(n.getFullYear(),dt.getMonth(),dt.getDate());if(nx<n)nx.setFullYear(n.getFullYear()+1);return Math.floor((nx-n)/86400000);}
function fmtB(b){if(!b)return null;return new Date(b).toLocaleDateString("en-US",{month:"long",day:"numeric"});}
function fmtD(iso){return new Date(iso).toLocaleDateString("en-US",{month:"short",day:"numeric",year:"numeric"});}
function ini(c){return((c.fname||"")[0]+(c.lname||"")[0]||"").toUpperCase();}
function urg(days,nudge){const r=days/nudge;if(r>=1.5)return{col:"#E74C3C",bg:"#FDECEC",label:"🚨 "+days+"d — overdue"};if(r>=0.8)return{col:"#F39C12",bg:"#FEF9EC",label:"⏰ "+days+"d — getting close"};return{col:"#27AE60",bg:"#EAFAF1",label:"✅ "+days+"d ago"};}
function nudgeList(){return S.contacts.filter(c=>daysSince(c.lastContact)>=c.nudgeDays*0.8).sort((a,b)=>(daysSince(b.lastContact)/b.nudgeDays)-(daysSince(a.lastContact)/a.nudgeDays));}
function bdayList(){return S.contacts.filter(c=>c.birthday).map(c=>({...c,dbu:dbu(c.birthday)})).sort((a,b)=>a.dbu-b.dbu);}
function cRef(id){return doc(db,"users",FIXED_UID,"contacts",id);}
function cCol(){return collection(db,"users",FIXED_UID,"contacts");}
function tagPill(tag){const m=TAG_META[tag]||{label:tag,bg:"#F3F4F6",col:"#6B7280"};return '<span style="font-size:10px;font-weight:700;padding:2px 8px;border-radius:20px;background:'+m.bg+';color:'+m.col+'">'+m.label+'</span>';}
function syncBadge(){const map={synced:{i:"☁️",l:"Synced",c:"#27AE60",b:"#EAFAF1"},saving:{i:"⏳",l:"Saving…",c:"#F39C12",b:"#FEF9EC"},error:{i:"⚠️",l:"Error",c:"#E74C3C",b:"#FDECEC"}};const s=map[S.syncStatus]||map.synced;return '<div style="display:inline-flex;align-items:center;gap:5px;padding:4px 10px;border-radius:20px;background:'+s.b+';font-size:11px;font-weight:700;color:'+s.c+';font-family:Nunito,sans-serif">'+s.i+' '+s.l+'</div>';}

// firebase
async function fbSet(c){S.syncStatus="saving";render();try{await setDoc(cRef(c.id),{...c,_ts:serverTimestamp()});}catch(e){S.syncStatus="error";render();}}
async function fbUp(id,p){S.syncStatus="saving";render();try{await updateDoc(cRef(id),p);}catch(e){S.syncStatus="error";render();}}

// subscribe
(function start(){
  const q=query(cCol());
  S.unsub=onSnapshot(q,snap=>{
    S.contacts=snap.docs.map(d=>({id:d.id,...d.data()}));
    S.syncStatus="synced";
    if(S.detail){const u=S.contacts.find(c=>c.id===S.detail.id);if(u)S.detail=u;}
    render();
  },()=>{S.syncStatus="error";render();});
})();

// AI
async function callAI(prompt){
  try{
    const r=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json","x-api-key":"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","anthropic-version":"2023-06-01","anthropic-dangerous-client-side-api-key-access":"true"},body:JSON.stringify({model:"claude-haiku-4-5-20251001",max_tokens:200,messages:[{role:"user",content:prompt}]})});
    const d=await r.json();
    return d.content?.find(b=>b.type==="text")?.text?.trim()||null;
  }catch{return null;}
}

// actions
async function markContacted(id){await fbUp(id,{lastContact:tod()});S.detail=null;render();}
async function addNote(id,text){const c=S.contacts.find(x=>x.id===id);const n={id:uid(),date:tod(),text};const notes=[n,...(c.contactNotes||[])];await fbUp(id,{contactNotes:notes,lastContact:tod()});S.noteAdding=false;render();}
async function delNote(cid,nid){const c=S.contacts.find(x=>x.id===cid);await fbUp(cid,{contactNotes:(c.contactNotes||[]).filter(n=>n.id!==nid)});}
async function addGift(cid,g){const c=S.contacts.find(x=>x.id===cid);await fbUp(cid,{gifts:[...(c.gifts||[]),g]});}
async function delGift(cid,gid){const c=S.contacts.find(x=>x.id===cid);await fbUp(cid,{gifts:(c.gifts||[]).filter(g=>g.id!==gid)});}
async function togGift(cid,gid){const c=S.contacts.find(x=>x.id===cid);await fbUp(cid,{gifts:(c.gifts||[]).map(g=>g.id===gid?{...g,bought:!g.bought}:g)});}
async function genDraft(type){
  const c=S.detail;if(!c)return;
  S.draftLoading=true;S.draftText=null;render();
  const fb={catchup:"Hey "+c.fname+"! Been way too long. Hope everything's good with you and the fam. We need to catch up soon!",hangout:"Yo "+c.fname+"! We should get together soon — cold drinks, good hangs. You in? 🍺",birthday:"Happy birthday "+c.fname+"! Hope it's a great one! 🎉",bbq:"Hey "+c.fname+"! Firing up the grill this weekend — you and the family should come through! 🔥"};
  const ps={catchup:"Laid-back dad texting friend "+c.fname+" to check in. Short casual warm iMessage 2-3 sentences. Background: "+(c.note||"old friend")+". Just the message.",hangout:"Fun casual text to "+c.fname+" suggesting hanging out. Chill dad energy. 2-3 sentences. Just the message.",birthday:"Short genuine birthday text to "+c.fname+". Real friend vibe. Just the message.",bbq:"Casual BBQ invite to "+c.fname+". Fun low-pressure. Just the message."};
  S.draftText=await callAI(ps[type])||fb[type];
  S.draftLoading=false;render();
}
async function genGifts(){
  const c=S.detail;if(!c)return;
  S.giftGenerating=true;render();
  try{
    const raw=await callAI('3 specific gift ideas for '+c.fname+' for '+S.addOccasion+'. Background: '+(c.note||"friend")+'. Under 10 words each. Return ONLY a JSON array like ["idea1","idea2","idea3"] no markdown.');
    const ideas=JSON.parse((raw||"[]").replace(/```json|```/g,"").trim());
    for(let i=0;i<ideas.length;i++)await addGift(c.id,{id:uid()+i,text:ideas[i],occasion:S.addOccasion,bought:false,date:tod()});
  }catch{
    const d=["Something personalized they'd love","Gift card to their favorite spot","A fun experience together"];
    for(let i=0;i<d.length;i++)await addGift(c.id,{id:uid()+i,text:d[i],occasion:S.addOccasion,bought:false,date:tod()});
  }
  S.giftGenerating=false;S.giftAdding=false;render();
}

// ── views ──────────────────────────────────────────────────
function dashView(){
  const nl=nudgeList(),bl=bdayList();
  let h='<div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;margin-bottom:16px">';
  [[S.contacts.length,"👥","Contacts","#FFF3E0","#2C2C2C"],[nl.length,"💬","To text","#FDECEC","#E74C3C"],[bl.filter(b=>b.dbu<=14).length,"🎂","Bdays soon","#FFF8E1","#F39C12"]].forEach(function(x){
    h+='<div style="background:#fff;border-radius:12px;padding:14px;border:1px solid #F0E8DF;text-align:center"><div style="font-size:22px;margin-bottom:4px">'+x[1]+'</div><div style="font-size:22px;font-weight:900;color:'+x[4]+';font-family:Nunito,sans-serif">'+x[0]+'</div><div style="font-size:11px;color:#9B9B9B;font-weight:600;margin-top:2px">'+x[2]+'</div></div>';
  });
  h+='</div>';
  if(nl.length){
    h+='<div style="background:#fff;border-radius:14px;border:1px solid #F0E8DF;margin-bottom:14px;overflow:hidden"><div style="padding:12px 16px;border-bottom:1px solid #F0E8DF;display:flex;align-items:center;justify-content:space-between"><span style="font-weight:800;font-size:14px;font-family:Nunito,sans-serif">👋 Reach out</span><button onclick="window._sv(\'nudges\')" style="padding:4px 10px;border-radius:8px;border:1.5px solid #E0E0E0;background:#fff;font-size:12px;cursor:pointer;color:#9B9B9B">See all</button></div>';
    nl.slice(0,3).forEach(function(c){
      var d=daysSince(c.lastContact),u=urg(d===999?0:d,c.nudgeDays);
      h+='<div style="display:flex;align-items:center;gap:12px;padding:10px 16px;border-bottom:1px solid #F5F5F5"><div style="width:38px;height:38px;border-radius:50%;background:'+c.color+'22;color:'+c.color+';display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:900;flex-shrink:0">'+ini(c)+'</div><div style="flex:1"><div style="font-weight:800;font-size:14px;font-family:Nunito,sans-serif">'+c.fname+' '+c.lname+'</div><span style="font-size:11px;font-weight:700;padding:2px 7px;border-radius:20px;background:'+u.bg+';color:'+u.col+'">'+u.label+'</span></div><button onclick="window._od(\''+c.id+'\')" style="padding:6px 12px;border-radius:8px;border:none;background:#34C759;color:#fff;font-weight:800;font-size:12px;cursor:pointer">Text 💬</button></div>';
    });
    h+='</div>';
  }
  if(bl.length){
    h+='<div style="background:#fff;border-radius:14px;border:1px solid #F0E8DF;overflow:hidden"><div style="padding:12px 16px;border-bottom:1px solid #F0E8DF;display:flex;align-items:center;justify-content:space-between"><span style="font-weight:800;font-size:14px;font-family:Nunito,sans-serif">🎂 Birthdays</span><button onclick="window._sv(\'birthdays\')" style="padding:4px 10px;border-radius:8px;border:1.5px solid #E0E0E0;background:#fff;font-size:12px;cursor:pointer;color:#9B9B9B">See all</button></div>';
    bl.slice(0,3).forEach(function(c){
      h+='<div onclick="window._od(\''+c.id+'\')" style="display:flex;align-items:center;gap:12px;padding:10px 16px;border-bottom:1px solid #F5F5F5;cursor:pointer"><div style="width:38px;height:38px;border-radius:50%;background:'+c.color+'22;color:'+c.color+';display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:900;flex-shrink:0">'+ini(c)+'</div><div style="flex:1"><div style="font-weight:800;font-size:14px;font-family:Nunito,sans-serif">'+c.fname+' '+c.lname+'</div><div style="font-size:12px;color:#9B9B9B">'+fmtB(c.birthday)+'</div></div><div style="font-size:18px;font-weight:900;font-family:Nunito,sans-serif;color:'+(c.dbu===0?"#E74C3C":c.dbu<=7?"#F39C12":"#FF6B35")+'">'+(c.dbu===0?"🎉Today!":c.dbu+"d")+'</div></div>';
    });
    h+='</div>';
  }
  if(!S.contacts.length){
    h='<div style="text-align:center;padding:50px 20px"><div style="font-size:48px;margin-bottom:12px">👋</div><div style="font-family:Nunito,sans-serif;font-size:20px;font-weight:800;margin-bottom:8px">Welcome!</div><div style="font-size:14px;color:#9B9B9B;line-height:1.6;margin-bottom:24px">Add your BBQ crew, close friends,<br>kids\' parents — whoever matters.</div><button onclick="window._oa()" style="padding:12px 24px;border-radius:12px;border:none;background:#FF6B35;color:#fff;font-weight:800;font-size:15px;cursor:pointer;font-family:Nunito,sans-serif">+ Add first contact 🔥</button></div>';
  }
  return h;
}

function contactsView(){
  var list=S.group==="all"?S.contacts:S.contacts.filter(function(c){return(c.tags||[]).includes(S.group);});
  if(!list.length)return '<div style="text-align:center;padding:40px;color:#9B9B9B"><div style="font-size:40px;margin-bottom:12px">👥</div><p>No contacts here yet!</p></div>';
  var h='<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:12px">';
  list.forEach(function(c){
    var d=daysSince(c.lastContact),bd=dbu(c.birthday),u=urg(d===999?0:d,c.nudgeDays);
    h+='<div onclick="window._od(\''+c.id+'\')" style="background:#fff;border-radius:14px;padding:14px;border:1px solid #F0E8DF;cursor:pointer;position:relative;overflow:hidden"><div style="position:absolute;top:0;left:0;right:0;height:4px;background:'+c.color+'"></div><div style="width:44px;height:44px;border-radius:50%;background:'+c.color+'22;color:'+c.color+';display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:900;margin:6px 0 8px">'+ini(c)+'</div><div style="font-weight:800;font-size:14px;color:#2C2C2C;font-family:Nunito,sans-serif">'+c.fname+' '+c.lname+'</div><div style="font-size:11px;color:#9B9B9B;margin-top:2px">'+(c.note?c.note.slice(0,35)+"…":"")+'</div><div style="display:flex;align-items:center;justify-content:space-between;margin-top:10px;padding-top:8px;border-top:1px solid #F0E8DF"><div style="display:flex;gap:3px;flex-wrap:wrap">'+(c.tags||[]).slice(0,1).map(tagPill).join("")+'</div><span style="font-size:11px;font-weight:700;color:'+u.col+'">'+(d===999?"never":d+"d")+'</span></div>'+(bd!==null&&bd<=14?'<div style="margin-top:6px;font-size:11px;font-weight:700;color:#FF6B35">🎂 '+(bd===0?"Today!":"In "+bd+"d")+'</div>':"")+'</div>';
  });
  h+='</div>';
  return h;
}

function birthdaysView(){
  var bl=bdayList();
  if(!bl.length)return '<div style="text-align:center;padding:40px;color:#9B9B9B"><div style="font-size:40px">🎂</div><p style="margin-top:12px">Add birthdays to contacts!</p></div>';
  var h='<div style="background:#fff;border-radius:14px;border:1px solid #F0E8DF;padding:0 16px">';
  bl.forEach(function(c){
    h+='<div onclick="window._od(\''+c.id+'\')" style="display:flex;align-items:center;gap:12px;padding:12px 0;border-bottom:1px solid #F5F5F5;cursor:pointer"><div style="width:40px;height:40px;border-radius:50%;background:'+c.color+'22;color:'+c.color+';display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:900;flex-shrink:0">'+ini(c)+'</div><div style="flex:1"><div style="font-weight:800;font-size:14px;font-family:Nunito,sans-serif">'+c.fname+' '+c.lname+'</div><div style="font-size:12px;color:#9B9B9B;margin-top:2px">'+fmtB(c.birthday)+' · turns '+(new Date().getFullYear()-new Date(c.birthday).getFullYear())+'</div></div><div style="text-align:right"><div style="font-family:Nunito,sans-serif;font-size:18px;font-weight:900;color:'+(c.dbu===0?"#E74C3C":c.dbu<=7?"#F39C12":"#FF6B35")+'">'+(c.dbu===0?"🎉Today!":c.dbu<=1?"Tomorrow!":c.dbu+"d")+'</div></div></div>';
  });
  h+='</div>';
  return h;
}

function nudgesView(){
  var nl=nudgeList();
  if(!nl.length)return '<div style="text-align:center;padding:40px;color:#9B9B9B"><div style="font-size:40px">🎉</div><p style="margin-top:12px">All caught up! Your circle feels the love.</p></div>';
  var h='<div style="display:flex;flex-direction:column;gap:10px">';
  nl.forEach(function(c){
    var d=daysSince(c.lastContact),u=urg(d===999?0:d,c.nudgeDays);
    h+='<div style="background:#fff;border-radius:12px;padding:12px 14px;border:1px solid #F0E8DF;display:flex;align-items:center;gap:12px"><div style="width:40px;height:40px;border-radius:50%;background:'+c.color+'22;color:'+c.color+';display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:900;flex-shrink:0">'+ini(c)+'</div><div style="flex:1;min-width:0"><div style="font-weight:800;font-size:14px;font-family:Nunito,sans-serif">'+c.fname+' '+c.lname+'</div><span style="font-size:11px;font-weight:700;padding:2px 7px;border-radius:20px;background:'+u.bg+';color:'+u.col+'">'+u.label+'</span></div><button onclick="window._od(\''+c.id+'\')" style="padding:7px 12px;border-radius:8px;border:none;background:#34C759;color:#fff;font-weight:800;font-size:12px;cursor:pointer;flex-shrink:0">Draft 💬</button></div>';
  });
  h+='</div>';
  return h;
}

function detailHTML(){
  var c=S.detail;if(!c)return "";
  var d=daysSince(c.lastContact),bd=dbu(c.birthday),isBday=bd!==null&&bd<=14,u=urg(d===999?0:d,c.nudgeDays),notes=c.contactNotes||[],gifts=c.gifts||[];

  // draft
  var draft='<div><div style="font-size:10px;font-weight:800;color:#9B9B9B;text-transform:uppercase;letter-spacing:1.5px;margin-bottom:8px">Draft a Text</div>';
  if(S.draftLoading){
    draft+='<div style="display:flex;align-items:center;gap:10px;padding:12px;background:#F9FAFB;border-radius:12px;font-size:13px;color:#9B9B9B;font-style:italic"><div style="width:14px;height:14px;border:2px solid #E0E0E0;border-top-color:#FF6B35;border-radius:50%;animation:spin 0.7s linear infinite"></div>Thinking…</div>';
  } else if(S.draftText){
    var sms=c.phone?"sms:+"+c.phone.replace(/\D/g,"")+"?body="+encodeURIComponent(S.draftText):"";

    +ni("nudges","💬","Nudges",nl||"")
    +'<div style="padding:10px 12px 4px;font-size:10px;font-weight:700;color:rgba(255,255,255,0.3);text-transform:uppercase;letter-spacing:1.5px;margin-top:8px">Groups</div>'
    +GROUPS.map(function(g){var a=S.view==="contacts"&&S.group===g.id;return '<div onclick="window._sg2(\''+g.id+'\')" style="display:flex;align-items:center;gap:10px;padding:9px 16px;cursor:pointer;font-size:13px;font-weight:600;color:'+(a?"#FF6B35":"#CDD6F4")+';background:'+(a?"rgba(255,107,53,0.12)":"transparent")+';border-left:3px solid '+(a?"#FF6B35":"transparent")+'"><span style="font-size:15px;width:20px;text-align:center">'+g.icon+'</span>'+g.label+'</div>';}).join("")
    +'<div style="flex:1"></div>'
    +'<div style="padding:12px 16px;border-top:1px solid rgba(255,255,255,0.06);font-size:11px;color:rgba(255,255,255,0.2);text-align:center">Inner Circle CRM</div>'
    +'</div>';
}

// ── render ──────────────────────────────────────────────────
function render(){
  var root=document.getElementById("root");
  var nl=nudgeList().length;
  var viewHTML="";
  if(S.view==="dashboard")viewHTML=dashView();
  else if(S.view==="contacts")viewHTML=contactsView();
  else if(S.view==="birthdays")viewHTML=birthdaysView();
  else if(S.view==="nudges")viewHTML=nudgesView();

  var titles={dashboard:"Dashboard",contacts:S.group==="all"?"Contacts":GROUPS.find(function(g){return g.id===S.group;})||{label:"Contacts"},birthdays:"Birthdays 🎂",nudges:"Nudges 💬"};
  var title=typeof titles[S.view]==="string"?titles[S.view]:(titles[S.view].label||"Contacts");

  var isMobile=window.innerWidth<768;

  if(isMobile){
    root.innerHTML='<div style="display:flex;flex-direction:column;height:100vh;height:100dvh;overflow:hidden;background:#FFF8F0">'
      +'<div style="padding:12px 16px;background:#1E1E2E;display:flex;align-items:center;justify-content:space-between;flex-shrink:0">'
      +'<div style="font-family:Nunito,sans-serif;font-size:16px;font-weight:900;color:#fff;display:flex;align-items:center;gap:8px"><span>🔥</span>'+title+'</div>'
      +'<div style="display:flex;align-items:center;gap:8px">'+syncBadge()+'<button onclick="window._oa()" style="padding:7px 14px;border-radius:10px;border:none;background:#FF6B35;color:#fff;font-weight:800;font-size:13px;cursor:pointer;font-family:Nunito,sans-serif">+ Add</button></div>'
      +'</div>'
      +'<div style="flex:1;overflow-y:auto;padding:14px">'+viewHTML+'</div>'
      +'<div style="display:flex;background:#1E1E2E;border-top:1px solid rgba(255,255,255,0.1);flex-shrink:0;padding-bottom:env(safe-area-inset-bottom)">'
      +[["dashboard","🏠","Home"],["contacts","👥","People"],["birthdays","🎂","Bdays"],["nudges","💬","Nudges"]].map(function(x){
        var v=x[0],icon=x[1],label=x[2];
        var active=S.view===v;
        return '<div onclick="window._sv(\''+v+'\')" style="flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:10px 4px 8px;cursor:pointer;position:relative;color:'+(active?"#FF6B35":"rgba(255,255,255,0.4)")+'"><span style="font-size:22px">'+icon+'</span><span style="font-size:10px;font-weight:700;margin-top:3px;font-family:Nunito,sans-serif">'+label+'</span>'+(v==="nudges"&&nl>0?'<span style="position:absolute;top:6px;right:calc(50% - 20px);background:#FF6B35;color:#fff;font-size:9px;font-weight:800;padding:1px 5px;border-radius:20px">'+nl+'</span>':"")+'</div>';
      }).join("")
      +'</div>'
      +(S.detail?detailHTML():"")
      +addModalHTML()
      +editModalHTML()
      +'</div>';
  } else {
    root.innerHTML='<div style="display:flex;height:100vh;overflow:hidden">'
      +sidebarHTML()
      +'<div style="flex:1;display:flex;flex-direction:column;overflow:hidden">'
      +'<div style="padding:16px 24px;background:#fff;border-bottom:1px solid #F0E8DF;display:flex;align-items:center;justify-content:space-between;flex-shrink:0">'
      +'<div style="font-size:20px;font-weight:900;font-family:Nunito,sans-serif">'+title+'</div>'
      +'<button onclick="window._oa()" style="padding:8px 16px;border-radius:10px;border:none;background:#FF6B35;color:#fff;font-weight:800;font-size:13px;cursor:pointer;font-family:Nunito,sans-serif">+ Add Contact</button>'
      +'</div>'
      +'<div style="flex:1;overflow-y:auto;padding:24px">'+viewHTML+'</div>'
      +'</div>'
      +(S.detail?detailHTML():"")
      +addModalHTML()
      +editModalHTML()
      +'</div>';
  }
}

// ── globals ──────────────────────────────────────────────────
window.S=S;
window.render=render;
window._sv=function(v){S.view=v;S.group="all";render();};
window._sg2=function(g){S.group=g;S.view="contacts";render();};
window._od=function(id){S.detail=S.contacts.find(function(c){return c.id===id;})||null;S.draftText=null;S.draftLoading=false;S.noteAdding=false;S.giftAdding=false;render();};
window._cl=function(){S.detail=null;render();};
window._oa=function(){S.showAdd=true;S.addColor=COLORS[0];S.addTags=[];render();};
window._mc=function(id){markContacted(id);};
window._en=function(id){var c=S.contacts.find(function(x){return x.id===id;});var v=prompt("Nudge every __ days for "+c.fname+":",c.nudgeDays);if(v&&!isNaN(v))fbUp(id,{nudgeDays:parseInt(v)});};
window._gd=function(t){genDraft(t);};
window._cd=function(){S.draftText=null;render();};
window._cp=function(){if(S.draftText){navigator.clipboard.writeText(S.draftText);var b=document.getElementById("cpbtn");if(b){b.textContent="✅ Copied!";setTimeout(function(){if(b)b.textContent="📋 Copy";},2000);}}};
window._sn=function(){var t=(document.getElementById("ni")||{}).value||"";if(t.trim()&&S.detail)addNote(S.detail.id,t.trim());};
window._dn=function(cid,nid){delNote(cid,nid);};
window._sg=function(){var t=(document.getElementById("gi")||{}).value||"";if(t.trim()&&S.detail)addGift(S.detail.id,{id:uid(),text:t.trim(),occasion:S.addOccasion,bought:false,date:tod()}).then(function(){S.giftAdding=false;render();});};
window._gg=function(){genGifts();};
window._dg=function(cid,gid){delGift(cid,gid);};
window._tg=function(cid,gid){togGift(cid,gid);};
window._tt=function(t){S.addTags=S.addTags.includes(t)?S.addTags.filter(function(x){return x!==t;}):[...S.addTags,t];render();};
window._oe=function(id){var c=S.contacts.find(function(x){return x.id===id;});if(!c)return;S.detail=c;S.showEdit=true;S.editColor=c.color||COLORS[0];S.editTags=[...(c.tags||[])];render();};
window._et=function(t){S.editTags=S.editTags.includes(t)?S.editTags.filter(function(x){return x!==t;}):[...S.editTags,t];render();};
window._sve=function(){
  if(!S.detail)return;
  var fn=(document.getElementById("ec-fn")||{}).value||"";
  if(!fn.trim())return;
  var patch={fname:fn.trim(),lname:((document.getElementById("ec-ln")||{}).value||"").trim(),phone:((document.getElementById("ec-ph")||{}).value||"").trim(),birthday:(document.getElementById("ec-bd")||{}).value||"",note:((document.getElementById("ec-nt")||{}).value||"").trim(),nudgeDays:parseInt((document.getElementById("ec-nd")||{}).value)||30,color:S.editColor,tags:[...S.editTags]};
  var id=S.detail.id;
  S.showEdit=false;render();
  fbUp(id,patch);
};
window._sc=function(){
  var fn=(document.getElementById("ac-fn")||{}).value||"";
  if(!fn.trim())return;
  var c={id:uid(),fname:fn.trim(),lname:((document.getElementById("ac-ln")||{}).value||"").trim(),phone:((document.getElementById("ac-ph")||{}).value||"").trim(),birthday:(document.getElementById("ac-bd")||{}).value||"",note:((document.getElementById("ac-nt")||{}).value||"").trim(),nudgeDays:parseInt((document.getElementById("ac-nd")||{}).value)||30,color:S.addColor,tags:[...S.addTags],lastContact:null,contactNotes:[],gifts:[]};
  S.showAdd=false;S.addTags=[];render();
  fbSet(c);
};
window.addEventListener("resize",render);
</script>
</body>
</html>
