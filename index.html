// Apple Calendar + Reminders via local bridge (serve_os.py)
async function fetchOSData(){
  if(S.osLoading)return;
  S.osLoading=true;render();
  try{
    const [calRes,remRes]=await Promise.all([
      fetch("http://localhost:3333/calendar").then(r=>r.json()).catch(()=>null),
      fetch("http://localhost:3333/reminders").then(r=>r.json()).catch(()=>null)
    ]);
    if(!calRes&&!remRes){S.osAvailable=false;}
    else{
      S.osAvailable=true;
      S.osEvents=(calRes&&calRes.ok)?calRes.events:[];
      S.osReminders=(remRes&&remRes.ok)?remRes.reminders:[];
    }
  }catch(e){S.osAvailable=false;}
  S.osLoading=false;render();
}

function fmtOSDate(iso){
  if(!iso)return"";
  const d=new Date(iso),n=new Date();
  const diff=Math.floor((new Date(d.getFullYear(),d.getMonth(),d.getDate())-new Date(n.getFullYear(),n.getMonth(),n.getDate()))/86400000);
  const time=d.toLocaleTimeString("en-US",{hour:"numeric",minute:"2-digit"});
  if(diff===0)return"Today "+time;
  if(diff===1)return"Tomorrow "+time;
  return d.toLocaleDateString("en-US",{month:"short",day:"numeric"})+" "+time;
}

function fmtOSDateAllDay(iso){
  if(!iso)return"";
  const d=new Date(iso),n=new Date();
  const diff=Math.floor((new Date(d.getFullYear(),d.getMonth(),d.getDate())-new Date(n.getFullYear(),n.getMonth(),n.getDate()))/86400000);
  if(diff===0)return"Today";
  if(diff===1)return"Tomorrow";
  return d.toLocaleDateString("en-US",{month:"short",day:"numeric"});
}

// helpers
function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2);}
function escH(s){return String(s).replace(/&/g,"&amp;").replace(/"/g,"&quot;").replace(/</g,"&lt;").replace(/>/g,"&gt;");}
function tod(){return new Date().toISOString().slice(0,10);}
function daysSince(d){if(!d)return 999;return Math.floor((Date.now()-new Date(d).getTime())/86400000);}
function telDigits(p){var d=String(p||"").replace(/\D/g,"");if(!d)return "";if(d.length===10)d="1"+d;return d;}
function fmtPhone(p){var d=telDigits(p);if(!d)return "";if(d.length===11&&d.charAt(0)==="1")return "+1 ("+d.slice(1,4)+") "+d.slice(4,7)+"-"+d.slice(7);return "+"+d;}
function dbu(b){if(!b)return null;const p=String(b).split("-");if(p.length<3)return null;const n=new Date();const t=new Date(n.getFullYear(),n.getMonth(),n.getDate());const nx=new Date(n.getFullYear(),(+p[1])-1,+p[2]);if(nx<t)nx.setFullYear(n.getFullYear()+1);return Math.round((nx-t)/86400000);}
function fmtB(b){if(!b)return null;const p=String(b).split("-");if(p.length<3)return null;return new Date(+p[0],(+p[1])-1,+p[2]).toLocaleDateString("en-US",{month:"long",day:"numeric"});}
function fmtD(iso){return new Date(iso).toLocaleDateString("en-US",{month:"short",day:"numeric",year:"numeric"});}
function ini(c){return((c.fname||"")[0]+(c.lname||"")[0]||"").toUpperCase();}
function bdayList(){return S.contacts.filter(c=>c.birthday).map(c=>({...c,dbu:dbu(c.birthday)})).sort((a,b)=>a.dbu-b.dbu);}
function upcomingList(){

    if(c.birthday){var b=dbu(c.birthday);if(b!==null&&b<=60)items.push({c:c,days:b});}

}

// ── Auto-reminders via bridge ─────────────────────────────────
function nthWeekdayOfMonth(year,month,weekday,nth){
  // month: 0-indexed. weekday: 0=Sun. Returns "YYYY-MM-DD".
  var d=new Date(year,month,1),count=0;
  while(d.getMonth()===month){if(d.getDay()===weekday)count++;if(count===nth)return d.toISOString().slice(0,10);d.setDate(d.getDate()+1);}
  return null;
}
async function addBridgeReminder(title,due,notes){
  try{
    await fetch("http://localhost:3333/reminders/add",{method:"POST",headers:{"Content-Type":"application/json"},
      body:JSON.stringify({title,list:"Reminders",due,time:"",priority:"none",notes:notes||""})});
  }catch(e){}
}
async function maybeScheduleReminders(){
  if(S.osAvailable!==true)return;
  var today=tod(),year=new Date().getFullYear();
  var dayKey="ic_autoRem_"+today;
  if(localStorage.getItem(dayKey))return;
  var added=false;

  // Birthdays ≤14 days away
  S.contacts.forEach(function(c){
    if(!c.birthday)return;
    var days=dbu(c.birthday);
    if(days===null||days>14||days<0)return;
    var remKey="ic_bday_"+c.id+"_"+year;
    if(localStorage.getItem(remKey))return;
    var parts=c.birthday.split("-");
    var bdateThis=year+"-"+parts[1]+"-"+parts[2];
    if(bdateThis<today)bdateThis=(year+1)+"-"+parts[1]+"-"+parts[2];
    var title=days===0?"🎂 Today is "+c.fname+"'s birthday!":"🎂 "+c.fname+"'s birthday in "+days+(days===1?" day":" days");
    addBridgeReminder(title,bdateThis,c.fname+" "+c.lname);
    localStorage.setItem(remKey,"1");
    added=true;
  });

  // Mother's Day (2nd Sunday of May) — remind 14 days before
  var mdDate=nthWeekdayOfMonth(year,4,0,2);
  var mdDays=mdDate?Math.round((new Date(mdDate)-new Date(today))/86400000):999;
  var mdKey="ic_md_"+year;
  if(mdDays>=0&&mdDays<=14&&!localStorage.getItem(mdKey)){
    addBridgeReminder("🌸 Mother's Day is "+(mdDays===0?"today!":"in "+mdDays+(mdDays===1?" day":" days")),mdDate,"");
    localStorage.setItem(mdKey,"1");added=true;
  }

  // Father's Day (3rd Sunday of June) — remind 14 days before
  var fdDate=nthWeekdayOfMonth(year,5,0,3);
  var fdDays=fdDate?Math.round((new Date(fdDate)-new Date(today))/86400000):999;
  var fdKey="ic_fd_"+year;
  if(fdDays>=0&&fdDays<=14&&!localStorage.getItem(fdKey)){
    addBridgeReminder("👨‍👧 Father's Day is "+(fdDays===0?"today!":"in "+fdDays+(fdDays===1?" day":" days")),fdDate,"");
    localStorage.setItem(fdKey,"1");added=true;
  }

  localStorage.setItem(dayKey,"1");
}

// vCard import
function vcUnescape(v){return String(v).replace(/\\n/gi,"\n").replace(/\\,/g,",").replace(/\\;/g,";").replace(/\\\\/g,"\\");}
function vcDecode(v,params){if(/QUOTED-PRINTABLE/.test(params)){try{v=v.replace(/=\r?\n/g,"").replace(/=([0-9A-F]{2})/gi,function(_,hx){return String.fromCharCode(parseInt(hx,16));});}catch(e){}}return vcUnescape(v);}
function normBday(b){if(!b)return "";b=b.trim();var m;if((m=b.match(/^(\d{4})-?(\d{2})-?(\d{2})/)))return m[1]+"-"+m[2]+"-"+m[3];if((m=b.match(/^--?(\d{2})-?(\d{2})$/)))return "2000-"+m[1]+"-"+m[2];return "";}
function parseVCards(text){
  text=String(text).replace(/\r\n/g,"\n").replace(/\n[ \t]/g,"");
  var out=[];
  var blocks=text.split(/BEGIN:VCARD/i).slice(1);
  blocks.forEach(function(b){
    var body=b.split(/END:VCARD/i)[0];
    var fn="",n=null,tels=[],bday="",org="";
    body.split("\n").forEach(function(line){
      line=line.replace(/\r/g,"").trim();if(!line)return;
      var ci=line.indexOf(":");if(ci<0)return;
      var head=line.slice(0,ci),val=line.slice(ci+1).trim();
      var hp=head.split(";");var nm=hp[0];if(nm.indexOf(".")>-1)nm=nm.split(".").pop();nm=nm.toUpperCase();
      var params=hp.slice(1).join(";").toUpperCase();
      if(nm==="FN")fn=vcDecode(val,params);
      else if(nm==="N")n=val.split(";").map(function(x){return vcUnescape(x).trim();});
      else if(nm==="TEL")tels.push({val:val,pref:/PREF|CELL|MOBILE|IPHONE|MAIN/.test(params)});
      else if(nm==="BDAY")bday=val;
      else if(nm==="ORG")org=vcDecode(val,params).split(";")[0].trim();
    });
    var fname="",lname="";
    if(n){lname=n[0]||"";fname=n[1]||"";}
    if(!fname&&!lname&&fn){var parts=fn.trim().split(/\s+/);fname=parts.shift()||"";lname=parts.join(" ");}
    if(!fname&&!lname)return;
    var tel="";if(tels.length){tel=(tels.filter(function(t){return t.pref;})[0]||tels[0]).val;}
    var digits=telDigits(tel);
    out.push({fname:fname.trim(),lname:lname.trim(),phone:digits,birthday:normBday(bday),note:org?("Works at "+org):""});
  });
  return out;
}

function getApiKey(){return localStorage.getItem("ic_anthropic_key")||"";}
async function callAI(prompt){
  const key=getApiKey();if(!key)return null;
  try{
    const r=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json","x-api-key":key,"anthropic-version":"2023-06-01","anthropic-dangerous-client-side-api-key-access":"true"},body:JSON.stringify({model:"claude-haiku-4-5-20251001",max_tokens:200,messages:[{role:"user",content:prompt}]})});
    const d=await r.json();
    return d.content?.find(b=>b.type==="text")?.text?.trim()||null;
  }catch{return null;}
}

  }
  S.giftGenerating=false;S.giftAdding=false;render();
}

var _qtRecog = null;

async function qtParse(input){
  S.qtLoading=true;S.qtContact=null;S.qtDraft=null;S.qtError=null;S.qtLogged=false;render();
  var names=S.contacts.map(function(c){return c.fname+" "+c.lname;}).join(", ");
  var parseRaw=await callAI('I have these contacts: '+names+'\n\nParse this command: "'+input+'"\n\nReturn ONLY valid JSON (no markdown): {"fname":"first name","lname":"last name","context":"what the message is about in a few words"}\n\nMatch the closest contact name. context = the reason/subject for the text.');
  if(!parseRaw){S.qtLoading=false;S.qtError="Couldn't parse that. Try again.";render();return;}
  var parsed;
  try{parsed=JSON.parse(parseRaw.replace(/```json|```/g,"").trim());}catch(e){S.qtLoading=false;S.qtError="Couldn't parse that. Try again.";render();return;}
  var contact=S.contacts.find(function(c){
    return c.fname.toLowerCase()===((parsed.fname||"").toLowerCase())&&c.lname.toLowerCase()===((parsed.lname||"").toLowerCase());
  })||S.contacts.find(function(c){
    return c.fname.toLowerCase()===((parsed.fname||"").toLowerCase());
  })||S.contacts.find(function(c){
    var full=(c.fname+" "+c.lname).toLowerCase();
    return full.includes((parsed.fname||"").toLowerCase())||full.includes((parsed.lname||"").toLowerCase());
  });
  if(!contact){S.qtLoading=false;S.qtError="Couldn't find a contact matching \""+escH((parsed.fname||"")+" "+(parsed.lname||""))+"\"";render();return;}
  S.qtContact=contact;
  var ctx=parsed.context||input;
  var draft=await callAI('Write a short casual iMessage from Michael to '+contact.fname+' about: '+ctx+'. Background on '+contact.fname+': '+(contact.note||"friend")+'. Easygoing dad energy. 1-2 sentences. Just the message text, nothing else.');
  if(!draft){S.qtLoading=false;S.qtError="Couldn't draft the message. Try again.";render();return;}
  S.qtDraft=draft;S.qtLoading=false;render();
}

function quickTextSheetHTML(){
  if(!S.showQt)return "";

    var seen={};
    cards=cards.filter(function(p){var k=(p.fname+" "+p.lname+"|"+p.phone).toLowerCase();if(seen[k])return false;seen[k]=1;return true;});
    cards.forEach(function(p){var dup=(p.phone&&phones[p.phone])||names[((p.fname||"")+" "+(p.lname||"")).trim().toLowerCase()];p._dup=!!dup;p._sel=!dup;});
    S.importParsed=cards;render();
    if(!cards.length)alert("Couldn't find any contacts in that file. Make sure it's a .vcf vCard export from Apple Contacts.");
  };
  r.onerror=function(){alert("Couldn't read that file.");};
  r.readAsText(f);
};
window._impTog=function(i){if(S.importParsed[i]){S.importParsed[i]._sel=!S.importParsed[i]._sel;render();}};
window._impAll=function(sel){S.importParsed.forEach(function(p){p._sel=sel;});render();};
window._impTag=function(t){S.importTags=S.importTags.includes(t)?S.importTags.filter(function(x){return x!==t;}):[...S.importTags,t];render();};
window._impGo=function(){doImport();};
window._sk=function(){S.showApiKey=true;render();};
window._sak=function(){var k=(document.getElementById("ak-input")||{}).value||"";if(k.trim()){localStorage.setItem("ic_anthropic_key",k.trim());S.showApiKey=false;render();}};
window._oe=function(id){var c=S.contacts.find(function(x){return x.id===id;});if(!c)return;S.detail=c;S.showEdit=true;S.editColor=c.color||COLORS[0];S.editTags=[...(c.tags||[])];render();};
window._et=function(t){S.editTags=S.editTags.includes(t)?S.editTags.filter(function(x){return x!==t;}):[...S.editTags,t];render();};
window._sve=function(){
  if(!S.detail)return;
  var fn=(document.getElementById("ec-fn")||{}).value||"";
  if(!fn.trim())return;
  var patch={fname:fn.trim(),lname:((document.getElementById("ec-ln")||{}).value||"").trim(),phone:((document.getElementById("ec-ph")||{}).value||"").trim(),birthday:(document.getElementById("ec-bd")||{}).value||"",note:((document.getElementById("ec-nt")||{}).value||"").trim(),color:S.editColor,tags:[...S.editTags]};
  var id=S.detail.id;
  S.showEdit=false;render();
  fbUp(id,patch);
};
window._sc=function(){
  var fn=(document.getElementById("ac-fn")||{}).value||"";
  if(!fn.trim())return;
  var c={id:uid(),fname:fn.trim(),lname:((document.getElementById("ac-ln")||{}).value||"").trim(),phone:((document.getElementById("ac-ph")||{}).value||"").trim(),birthday:(document.getElementById("ac-bd")||{}).value||"",note:((document.getElementById("ac-nt")||{}).value||"").trim(),color:S.addColor,tags:[...S.addTags],lastContact:null,contactNotes:[],gifts:[]};
  S.showAdd=false;S.addTags=[];render();
  fbSet(c);
};
window.addEventListener("resize",render);

// ── Quick Text globals ────────────────────────────────────
window._qtOpen=function(){S.showQt=true;S.qtText="";S.qtContact=null;S.qtDraft=null;S.qtError=null;S.qtLogged=false;render();setTimeout(function(){var el=document.getElementById("qt-input");if(el)el.focus();},80);};
window._qtSend=function(){var t=S.qtText.trim();if(!t||S.qtLoading)return;qtParse(t);};
window._qtLog=function(){qtSendLog();};
window._qtMic=function(){
  if(S.qtListening){if(_qtRecog){_qtRecog.stop();}_qtRecog=null;S.qtListening=false;render();return;}
  var SR=window.SpeechRecognition||window.webkitSpeechRecognition;
  if(!SR){alert("Voice input not supported in this browser.");return;}
  _qtRecog=new SR();_qtRecog.lang="en-US";_qtRecog.interimResults=false;_qtRecog.maxAlternatives=1;
  _qtRecog.onresult=function(e){var t=e.results[0][0].transcript;S.qtText=t;S.qtListening=false;_qtRecog=null;render();window._qtSend();};
  _qtRecog.onerror=function(){S.qtListening=false;_qtRecog=null;render();};
  _qtRecog.onend=function(){S.qtListening=false;_qtRecog=null;render();};
  S.qtListening=true;render();_qtRecog.start();
};
</script>
