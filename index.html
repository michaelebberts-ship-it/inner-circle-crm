<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-title" content="Inner Circle"/>
<meta name="theme-color" content="#1E1E2E"/>
<title>Inner Circle CRM 🔥</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Nunito+Sans:wght@400;600;700&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body,#root{height:100%;font-family:'Nunito Sans',sans-serif}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes slideIn{from{transform:translateX(100%)}to{transform:translateX(0)}}
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-thumb{background:#E0D5CC;border-radius:10px}
</style>
</head>
<body>
<div id="root"></div>

<!-- Firebase -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, collection, doc, onSnapshot, setDoc, updateDoc, deleteDoc, query, orderBy, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

// ── Firebase init (no login — fixed user ID) ──────────────
const app = initializeApp({
  apiKey: "AIzaSyDINHNV1Ze3QfhXwBPwe22LnUe-xxnU-n4",
  authDomain: "inner-circle-crm.firebaseapp.com",
  projectId: "inner-circle-crm",
  storageBucket: "inner-circle-crm.firebasestorage.app",
  messagingSenderId: "805498964211",
  appId: "1:805498964211:web:be124fa6606b7bc2010f86"
});
const db = getFirestore(app);
// Fixed user ID — no login needed, data always goes to same place
const FIXED_UID = "owner-inner-circle-crm";

// ── Constants ─────────────────────────────────────────────
const GROUPS = [{id:"all",label:"Everyone",icon:"🌐"},{id:"bbq",label:"BBQ Team",icon:"🍖"},{id:"friends",label:"Close Friends",icon:"🍺"},{id:"kids",label:"Kids' Parents",icon:"⚽"},{id:"family",label:"Family",icon:"🏡"}];
const TAG_META = {bbq:{label:"🍖 BBQ",bg:"#FFF3E0",col:"#E65100"},friends:{label:"🍺 Friends",bg:"#E8F5E9",col:"#2E7D32"},kids:{label:"⚽ Kids",bg:"#E3F2FD",col:"#1565C0"},family:{label:"🏡 Family",bg:"#FCE4EC",col:"#880E4F"},work:{label:"💼 Work",bg:"#F3E5F5",col:"#6A1B9A"}};
const COLORS = ["#FF6B35","#3498DB","#2ECC71","#9B59B6","#E91E63","#F39C12","#1ABC9C"];
const OCCASIONS = ["🎂 Birthday","🎄 Christmas","🎁 Holiday","👨‍👧 Father's Day","👩‍👧 Mother's Day","🎓 Graduation","🏠 Housewarming","💍 Wedding","⭐ Just because"];

// ── State ─────────────────────────────────────────────────
let STATE = {
  contacts: [], syncStatus: "synced",
  view: "dashboard", group: "all", detail: null, showAdd: false,
  addContactColor: COLORS[0], addContactTags: [],
  addOccasion: "🎂 Birthday", draftText: null, draftLoading: false,
  noteAdding: false, giftAdding: false, giftGenerating: false,
  firestoreUnsub: null
};
let addFormData = {};

function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2);}
function today(){return new Date().toISOString().slice(0,10);}
function daysSince(d){if(!d)return 999;return Math.floor((new Date()-new Date(d))/86400000);}
function daysUntilBday(b){if(!b)return null;const dt=new Date(b);const next=new Date(new Date().getFullYear(),dt.getMonth(),dt.getDate());if(next<new Date())next.setFullYear(new Date().getFullYear()+1);return Math.floor((next-new Date())/86400000);}
function fmtBday(b){if(!b)return null;return new Date(b).toLocaleDateString("en-US",{month:"long",day:"numeric"});}
function fmtDate(iso){return new Date(iso).toLocaleDateString("en-US",{month:"short",day:"numeric",year:"numeric"});}
function initials(c){return((c.fname||"")[0]+(c.lname||"")[0]||"").toUpperCase();}
function urgency(days,nudge){const r=days/nudge;if(r>=1.5)return{col:"#E74C3C",bg:"#FDECEC",label:`🚨 ${days}d — overdue`};if(r>=0.8)return{col:"#F39C12",bg:"#FEF9EC",label:`⏰ ${days}d — getting close`};return{col:"#27AE60",bg:"#EAFAF1",label:`✅ ${days}d ago`};}
function getNudgeList(){return STATE.contacts.filter(c=>{const d=daysSince(c.lastContact);return d>=c.nudgeDays*0.8;}).sort((a,b)=>(daysSince(b.lastContact)/b.nudgeDays)-(daysSince(a.lastContact)/a.nudgeDays));}
function getBdayList(){return STATE.contacts.filter(c=>c.birthday).map(c=>({...c,dbu:daysUntilBday(c.birthday)})).sort((a,b)=>a.dbu-b.dbu);}

// ── Firebase helpers ──────────────────────────────────────
function contactsRef(){return collection(db,"users",FIXED_UID,"contacts");}
function contactRef(id){return doc(db,"users",FIXED_UID,"contacts",id);}

async function fbSave(contact){
  STATE.syncStatus="saving"; render();
  try{ await setDoc(contactRef(contact.id),{...contact,createdAt:serverTimestamp()}); }
  catch(e){ console.error(e); STATE.syncStatus="error"; render(); }
}
async function fbUpdate(id,patch){
  STATE.syncStatus="saving"; render();
  try{ await updateDoc(contactRef(id),patch); }
  catch(e){ console.error(e); STATE.syncStatus="error"; render(); }
}

// ── Auto-start — no login needed ─────────────────────────
function subscribeContacts(){
  if(STATE.firestoreUnsub) STATE.firestoreUnsub();
  const q=query(contactsRef(),orderBy("createdAt","asc"));
  STATE.firestoreUnsub=onSnapshot(q,snap=>{
    STATE.contacts=snap.docs.map(d=>({id:d.id,...d.data()}));
    STATE.syncStatus="synced";
    if(STATE.detail){
      const updated=STATE.contacts.find(c=>c.id===STATE.detail.id);
      if(updated) STATE.detail=updated;
    }
    render();
  },()=>{STATE.syncStatus="error";render();});
}

// Start immediately — no auth needed
subscribeContacts();

// ── AI ────────────────────────────────────────────────────
async function callAI(prompt){
  try{
    const res=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:200,messages:[{role:"user",content:prompt}]})});
    const data=await res.json();
    return data.content?.find(b=>b.type==="text")?.text?.trim()||null;
  }catch{return null;}
}

// ── Actions ───────────────────────────────────────────────
async function markContacted(id){
  await fbUpdate(id,{lastContact:today()});
  STATE.detail=null; render();
}
async function addNote(contactId,text){
  const c=STATE.contacts.find(x=>x.id===contactId);
  const n={id:uid(),date:today(),text};
  const notes=[n,...(c.contactNotes||[])];
  await fbUpdate(contactId,{contactNotes:notes,lastContact:today()});
  STATE.noteAdding=false; render();
}
async function deleteNote(contactId,noteId){
  const c=STATE.contacts.find(x=>x.id===contactId);
  const notes=(c.contactNotes||[]).filter(n=>n.id!==noteId);
  await fbUpdate(contactId,{contactNotes:notes});
}
async function addGift(contactId,gift){
  const c=STATE.contacts.find(x=>x.id===contactId);
  const gifts=[...(c.gifts||[]),gift];
  await fbUpdate(contactId,{gifts});
}
async function deleteGift(contactId,giftId){
  const c=STATE.contacts.find(x=>x.id===contactId);
  const gifts=(c.gifts||[]).filter(g=>g.id!==giftId);
  await fbUpdate(contactId,{gifts});
}
async function toggleGift(contactId,giftId){
  const c=STATE.contacts.find(x=>x.id===contactId);
  const gifts=(c.gifts||[]).map(g=>g.id===giftId?{...g,bought:!g.bought}:g);
  await fbUpdate(contactId,{gifts});
}
async function saveNewContact(){
  const fname=(document.getElementById('ac-fname')||{}).value?.trim();
  if(!fname)return;
  const c={
    id:uid(),
    fname,
    lname:(document.getElementById('ac-lname')||{}).value?.trim()||"",
    phone:(document.getElementById('ac-phone')||{}).value?.trim()||"",
    birthday:(document.getElementById('ac-bday')||{}).value||"",
    note:(document.getElementById('ac-note')||{}).value?.trim()||"",
    nudgeDays:parseInt((document.getElementById('ac-nudge')||{}).value)||30,
    color:STATE.addContactColor,
    tags:[...STATE.addContactTags],
    lastContact:null,
    contactNotes:[],
    gifts:[]
  };
  STATE.showAdd=false; STATE.addContactTags=[]; render();
  await fbSave(c);
}

async function generateDraft(type){
  const c=STATE.detail; if(!c)return;
  STATE.draftLoading=true; STATE.draftText=null; render();
  const prompts={
    catchup:`You're a laid-back easygoing dad texting your friend ${c.fname} to check in. Haven't reached out in a while. Write a short casual warm iMessage (2-3 sentences). Not cheesy. Background: ${c.note||"old friend"}. Just the message, no quotes.`,
    hangout:`Write a fun casual text to ${c.fname} suggesting hanging out. Chill dad energy. Background: ${c.note||"friend"}. 2-3 sentences. Just the message, no quotes.`,
    birthday:`Short genuine birthday text to ${c.fname}. Real friend vibe, not a Hallmark card. Maybe a light joke. Just the message, no quotes.`,
    bbq:`Casual BBQ invite text to ${c.fname}. Fun and low-pressure. Mention food and cold drinks. Background: ${c.note||"BBQ buddy"}. Just the message, no quotes.`,
  };
  const fallbacks={catchup:`Hey ${c.fname}! Been way too long man. Hope everything's good with you and the fam. We need to catch up soon!`,hangout:`Yo ${c.fname}! We should get together soon — cold drinks, good hangs. You in? 🍺`,birthday:`Happy birthday ${c.fname}! Hope it's a great one! 🎉`,bbq:`Hey ${c.fname}! Firing up the grill this weekend — you and the family should come through! 🔥`};
  STATE.draftText=await callAI(prompts[type])||fallbacks[type];
  STATE.draftLoading=false; render();
}

async function generateGiftIdeas(){
  const c=STATE.detail; if(!c)return;
  STATE.giftGenerating=true; render();
  try{
    const raw=await callAI(`Give me 3 specific practical gift ideas for ${c.fname} for ${STATE.addOccasion}. Background: ${c.note||"a friend"}. Each idea under 10 words. Return ONLY a JSON array of strings, no markdown. Example: ["Gift one","Gift two","Gift three"]`);
    const ideas=JSON.parse((raw||"[]").replace(/```json|```/g,"").trim());
    for(let i=0;i<ideas.length;i++) await addGift(c.id,{id:uid()+i,text:ideas[i],occasion:STATE.addOccasion,bought:false,date:today()});
  }catch{
    const defaults=["Something personalized they'd actually use","A gift card to their favorite spot","A fun experience to do together"];
    for(let i=0;i<defaults.length;i++) await addGift(c.id,{id:uid()+i,text:defaults[i],occasion:STATE.addOccasion,bought:false,date:today()});
  }
  STATE.giftGenerating=false; STATE.giftAdding=false; render();
}

// ── HTML builders ─────────────────────────────────────────
function tagPill(tag){const m=TAG_META[tag]||{label:tag,bg:"#F3F4F6",col:"#6B7280"};return `<span style="font-size:10px;font-weight:700;padding:2px 8px;border-radius:20px;background:${m.bg};color:${m.col};font-family:'Nunito',sans-serif">${m.label}</span>`;}

function syncBadge(){
  const map={synced:{icon:"☁️",label:"Synced",col:"#27AE60",bg:"#EAFAF1"},saving:{icon:"⏳",label:"Saving…",col:"#F39C12",bg:"#FEF9EC"},offline:{icon:"📵",label:"Offline",col:"#9B9B9B",bg:"#F5F5F5"},error:{icon:"⚠️",label:"Error",col:"#E74C3C",bg:"#FDECEC"}};
  const s=map[STATE.syncStatus]||map.synced;
  return `<div style="display:flex;align-items:center;gap:5px;padding:4px 10px;border-radius:20px;background:${s.bg};font-size:11px;font-weight:700;color:${s.col};font-family:'Nunito',sans-serif">${s.icon} ${s.label}</div>`;
}

function sidebar(){
  const nudgeCount=getNudgeList().length;
  function navItem(v,icon,label,badge=""){
    const active=STATE.view===v&&STATE.group==="all";
    return `<div onclick="setView('${v}')" style="display:flex;align-items:center;gap:10px;padding:9px 16px;cursor:pointer;font-size:13px;font-weight:600;color:${active?"#FF6B35":"#CDD6F4"};background:${active?"rgba(255,107,53,0.12)":"transparent"};border-left:3px solid ${active?"#FF6B35":"transparent"};transition:all 0.15s">
      <span style="font-size:15px;width:20px;text-align:center">${icon}</span>${label}
      ${badge?`<span style="margin-left:auto;background:#FF6B35;color:#fff;font-size:10px;font-weight:800;padding:1px 6px;border-radius:20px">${badge}</span>`:""}
    </div>`;
  }
  function grpItem(g){
    const active=STATE.view==="contacts"&&STATE.group===g.id;
    return `<div onclick="setGroup('${g.id}')" style="display:flex;align-items:center;gap:10px;padding:9px 16px;cursor:pointer;font-size:13px;font-weight:600;color:${active?"#FF6B35":"#CDD6F4"};background:${active?"rgba(255,107,53,0.12)":"transparent"};border-left:3px solid ${active?"#FF6B35":"transparent"};transition:all 0.15s">
      <span style="font-size:15px;width:20px;text-align:center">${g.icon}</span>${g.label}
    </div>`;
  }
  return `<div style="width:210px;background:#1E1E2E;display:flex;flex-direction:column;flex-shrink:0;overflow-y:auto;height:100vh">
    <div style="padding:22px 20px 14px;font-family:'Nunito',sans-serif;font-size:17px;font-weight:900;color:#fff;border-bottom:1px solid rgba(255,255,255,0.08);display:flex;align-items:center;gap:8px">
      <span style="font-size:22px">🔥</span> Inner Circle
    </div>
    <div style="padding:8px 12px 4px">
      ${syncBadge()}
    </div>
    <div style="padding:10px 12px 4px;font-size:10px;font-weight:700;color:rgba(255,255,255,0.3);text-transform:uppercase;letter-spacing:1.5px">Menu</div>
    ${navItem("dashboard","🏠","Dashboard")}
    ${navItem("contacts","👥","Contacts")}
    ${navItem("birthdays","🎂","Birthdays")}
    ${navItem("nudges","💬","Nudges",nudgeCount||"")}
    <div style="padding:10px 12px 4px;font-size:10px;font-weight:700;color:rgba(255,255,255,0.3);text-transform:uppercase;letter-spacing:1.5px;margin-top:8px">Groups</div>
    ${GROUPS.map(grpItem).join("")}
    <div style="flex:1"></div>
    <div style="padding:12px 16px;border-top:1px solid rgba(255,255,255,0.06)">
      <div style="font-size:11px;color:rgba(255,255,255,0.2);text-align:center">Inner Circle CRM</div>
    </div>
  </div>`;
}

function dashboardView(){
  const nudges=getNudgeList();
  const bdays=getBdayList();
  const stats=[
    [STATE.contacts.length,"👥","People in your circle","#FFF3E0","#2C2C2C"],
    [nudges.length,"💬","Could use a text","#FDECEC","#E74C3C"],
    [bdays.filter(b=>b.dbu<=14).length,"🎂","Birthdays in 2 weeks","#FFF8E1","#F39C12"]
  ];
  let html=`<div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px;margin-bottom:20px">
    ${stats.map(([n,icon,label,bg,col])=>`<div style="background:#fff;border-radius:14px;padding:18px 20px;border:1px solid #F0E8DF;display:flex;align-items:center;gap:14px">
      <div style="width:44px;height:44px;border-radius:12px;background:${bg};display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0">${icon}</div>
      <div><div style="font-size:26px;font-weight:900;color:${col};font-family:'Nunito',sans-serif">${n}</div><div style="font-size:12px;color:#9B9B9B;font-weight:600;margin-top:2px">${label}</div></div>
    </div>`).join("")}
  </div>`;

  if(nudges.length){
    html+=`<div style="background:#fff;border-radius:16px;border:1px solid #F0E8DF;margin-bottom:20px;overflow:hidden">
      <div style="padding:14px 20px;border-bottom:1px solid #F0E8DF;display:flex;align-items:center;justify-content:space-between">
        <span style="font-weight:800;font-size:15px;font-family:'Nunito',sans-serif">👋 Time to reach out</span>
        <button onclick="setView('nudges')" style="padding:5px 12px;border-radius:8px;border:1.5px solid #E0E0E0;background:#fff;font-size:12px;font-weight:600;cursor:pointer;font-family:'Nunito Sans',sans-serif;color:#9B9B9B">See all</button>
      </div>
      <div style="padding:10px 16px">
        ${nudges.slice(0,3).map(c=>{const d=daysSince(c.lastContact);const u=urgency(d===999?0:d,c.nudgeDays);return`<div style="display:flex;align-items:center;gap:14px;padding:10px 0;border-bottom:1px solid #F5F5F5">
          <div style="width:42px;height:42px;border-radius:50%;background:${c.color}22;color:${c.color};display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:900;font-family:'Nunito',sans-serif;flex-shrink:0">${initials(c)}</div>
          <div style="flex:1"><div style="font-weight:800;font-size:14px;font-family:'Nunito',sans-serif">${c.fname} ${c.lname}</div><span style="font-size:11px;font-weight:700;padding:2px 8px;border-radius:20px;background:${u.bg};color:${u.col}">${u.label}</span></div>
          <button onclick="openDetail('${c.id}')" style="padding:7px 14px;border-radius:10px;border:none;background:#34C759;color:#fff;font-weight:800;font-size:12px;cursor:pointer;font-family:'Nunito',sans-serif">Draft Text 💬</button>
        </div>`;}).join("")}
      </div>
    </div>`;
  }

  if(bdays.length){
    html+=`<div style="background:#fff;border-radius:16px;border:1px solid #F0E8DF;overflow:hidden">
      <div style="padding:14px 20px;border-bottom:1px solid #F0E8DF;display:flex;align-items:center;justify-content:space-between">
        <span style="font-weight:800;font-size:15px;font-family:'Nunito',sans-serif">🎂 Upcoming birthdays</span>
        <button onclick="setView('birthdays')" style="padding:5px 12px;border-radius:8px;border:1.5px solid #E0E0E0;background:#fff;font-size:12px;font-weight:600;cursor:pointer;color:#9B9B9B">See all</button>
      </div>
      <div style="padding:0 20px">
        ${bdays.slice(0,3).map(c=>`<div onclick="openDetail('${c.id}')" style="display:flex;align-items:center;gap:14px;padding:12px 0;border-bottom:1px solid #F5F5F5;cursor:pointer">
          <div style="width:40px;height:40px;border-radius:50%;background:${c.color}22;color:${c.color};display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:900;font-family:'Nunito',sans-serif;flex-shrink:0">${initials(c)}</div>
          <div style="flex:1"><div style="font-weight:800;font-size:14px;font-family:'Nunito',sans-serif">${c.fname} ${c.lname}</div><div style="font-size:12px;color:#9B9B9B;margin-top:2px">${fmtBday(c.birthday)}</div></div>
          <div style="font-family:'Nunito',sans-serif;font-size:20px;font-weight:900;color:${c.dbu===0?"#E74C3C":c.dbu<=7?"#F39C12":"#FF6B35"}">${c.dbu===0?"🎉 Today!":c.dbu+"d"}</div>
        </div>`).join("")}
      </div>
    </div>`;
  }

  if(!STATE.contacts.length){
    html=`<div style="text-align:center;padding:60px 20px;color:#9B9B9B">
      <div style="font-size:48px;margin-bottom:16px">👋</div>
      <div style="font-family:'Nunito',sans-serif;font-size:20px;font-weight:800;color:#2C2C2C;margin-bottom:8px">Welcome to Inner Circle!</div>
      <div style="font-size:14px;line-height:1.6;margin-bottom:24px">Add your first contact to get started.<br>Your BBQ crew, close friends, kids' parents — whoever matters.</div>
      <button onclick="openAdd()" style="padding:12px 24px;border-radius:12px;border:none;background:#FF6B35;color:#fff;font-weight:800;font-size:15px;cursor:pointer;font-family:'Nunito',sans-serif;box-shadow:0 4px 14px #FF6B3544">+ Add your first contact 🔥</button>
    </div>`;
  }
  return html;
}

function contactsView(){
  const list=STATE.group==="all"?STATE.contacts:STATE.contacts.filter(c=>(c.tags||[]).includes(STATE.group));
  if(!list.length) return`<div style="text-align:center;padding:40px;color:#9B9B9B"><div style="font-size:40px;margin-bottom:12px">👥</div><p>No contacts here yet — add some!</p></div>`;
  return`<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:14px">
    ${list.map(c=>{const d=daysSince(c.lastContact);const bdu=daysUntilBday(c.birthday);const u=urgency(d===999?0:d,c.nudgeDays);return`
    <div onclick="openDetail('${c.id}')" onmouseenter="this.style.boxShadow='0 6px 20px rgba(0,0,0,0.08)'" onmouseleave="this.style.boxShadow='none'" style="background:#fff;border-radius:16px;padding:18px;border:1px solid #F0E8DF;cursor:pointer;position:relative;overflow:hidden;transition:all 0.15s">
      <div style="position:absolute;top:0;left:0;right:0;height:4px;background:${c.color}"></div>
      <div style="width:50px;height:50px;border-radius:50%;background:${c.color}22;color:${c.color};display:flex;align-items:center;justify-content:center;font-size:17px;font-weight:900;font-family:'Nunito',sans-serif;margin:8px 0 10px">${initials(c)}</div>
      <div style="font-weight:800;font-size:15px;color:#2C2C2C;font-family:'Nunito',sans-serif">${c.fname} ${c.lname}</div>
      <div style="font-size:12px;color:#9B9B9B;margin-top:3px">${c.note?c.note.slice(0,45)+"…":""}</div>
      <div style="display:flex;align-items:center;justify-content:space-between;margin-top:12px;padding-top:10px;border-top:1px solid #F0E8DF">
        <div style="display:flex;gap:4px;flex-wrap:wrap">${(c.tags||[]).slice(0,2).map(tagPill).join("")}</div>
        <span style="font-size:11px;font-weight:700;color:${u.col}">${d===999?"never":d+"d"}</span>
      </div>
      ${bdu!==null&&bdu<=14?`<div style="margin-top:8px;font-size:11px;font-weight:700;color:#FF6B35">🎂 ${bdu===0?"Today!":"In "+bdu+"d"}</div>`:""}
    </div>`;}).join("")}
  </div>`;
}

function birthdaysView(){
  const bdays=getBdayList();
  if(!bdays.length) return`<div style="text-align:center;padding:40px;color:#9B9B9B"><div style="font-size:40px">🎂</div><p>Add birthdays to your contacts!</p></div>`;

        <div style="font-size:12px;color:#9B9B9B;margin-top:2px">${fmtBday(c.birthday)} · turns ${new Date().getFullYear()-new Date(c.birthday).getFullYear()}</div>

    draftSection+=`<div style="display:flex;align-items:center;gap:10px;padding:12px 14px;background:#F9FAFB;border-radius:12px;font-size:13px;color:#9B9B9B;font-style:italic">

    </div>`;

    const smsHref=c.phone?`sms:+${c.phone.replace(/\D/g,"")}?body=${encodeURIComponent(STATE.draftText)}`:"";

      <button onclick="copyDraft()" style="padding:7px 13px;border-radius:10px;border:1.5px solid #E0E0E0;background:#fff;font-weight:700;font-size:12px;cursor:pointer;color:#555" id="copy-btn">📋 Copy</button>
      <button onclick="clearDraft()" style="padding:7px 13px;border-radius:10px;border:1.5px solid #E0E0E0;background:#fff;font-weight:600;font-size:12px;cursor:pointer;color:#9B9B9B">↺ Different</button>
    </div>`;
  } else {
    draftSection+=`<div style="display:flex;gap:7px;flex-wrap:wrap">
      <button onclick="generateDraft('catchup')" style="padding:8px 13px;border-radius:10px;border:none;background:#FF6B35;color:#fff;font-weight:800;font-size:12px;cursor:pointer;font-family:'Nunito',sans-serif">💬 Checking in</button>
      <button onclick="generateDraft('hangout')" style="padding:8px 13px;border-radius:10px;border:none;background:#3498DB;color:#fff;font-weight:800;font-size:12px;cursor:pointer;font-family:'Nunito',sans-serif">🍻 Hangout</button>
      ${isBday?`<button onclick="generateDraft('birthday')" style="padding:8px 13px;border-radius:10px;border:none;background:#F39C12;color:#fff;font-weight:800;font-size:12px;cursor:pointer;font-family:'Nunito',sans-serif">🎂 Birthday</button>`:""}
      <button onclick="generateDraft('bbq')" style="padding:8px 13px;border-radius:10px;border:none;background:#2ECC71;color:#fff;font-weight:800;font-size:12px;cursor:pointer;font-family:'Nunito',sans-serif">🔥 BBQ invite</button>

  // Notes section
  let notesSection=`<div>

    </div>
    ${STATE.noteAdding?`<div style="background:#FFFBF8;border:1.5px solid #FFD4C2;border-radius:12px;padding:14px;margin-bottom:12px">

        <button onclick="saveNote()" style="padding:6px 14px;border-radius:8px;border:none;background:#FF6B35;font-size:12px;font-weight:800;cursor:pointer;color:#fff;font-family:'Nunito',sans-serif">Save Note</button>
      </div>
    </div>`:""}
    ${notes.length===0&&!STATE.noteAdding?`<div style="text-align:center;padding:16px 12px;background:#FAFAFA;border-radius:12px;border:1.5px dashed #E8E0D8"><div style="font-size:20px;margin-bottom:5px">📝</div><div style="font-size:12px;color:#9B9B9B;line-height:1.5">No notes yet. After you catch up,<br>jot down what you talked about.</div></div>`:""}
    ${notes.map(n=>`<div style="background:#FAFAFA;border-radius:12px;padding:12px 14px;margin-bottom:8px;border:1px solid #F0E8DF">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:5px">
        <span style="font-size:11px;font-weight:700;color:#C4B5A8;font-family:'Nunito',sans-serif">${fmtDate(n.date)}</span>
        <button onclick="deleteNote('${c.id}','${n.id}')" onmouseenter="this.style.color='#E74C3C'" onmouseleave="this.style.color='#D0C8C0'" style="background:none;border:none;cursor:pointer;font-size:13px;color:#D0C8C0;padding:0 2px">✕</button>
      </div>
      <div style="font-size:13px;color:#444;line-height:1.65;white-space:pre-wrap">${n.text.replace(/</g,"&lt;")}</div>
    </div>`).join("")}
  </div>`;

  // Gifts section
  const grouped=gifts.reduce((acc,g)=>{acc[g.occasion]=acc[g.occasion]||[];acc[g.occasion].push(g);return acc;},{});
  let giftsSection=`<div>
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px">

      ${!STATE.giftAdding?`<button onclick="STATE.giftAdding=true;render()" style="padding:4px 10px;border-radius:8px;border:1.5px solid #E0E0E0;background:#fff;font-size:12px;font-weight:700;cursor:pointer;color:#FF6B35;font-family:'Nunito',sans-serif">+ Add idea</button>`:""}

    ${STATE.giftAdding?`<div style="background:#FFF8F5;border:1.5px solid #FFD4C2;border-radius:12px;padding:14px;margin-bottom:12px">
      <div style="font-size:11px;font-weight:700;color:#9B9B9B;margin-bottom:6px;font-family:'Nunito',sans-serif">OCCASION</div>
      <div style="display:flex;flex-wrap:wrap;gap:5px;margin-bottom:10px">
        ${OCCASIONS.map(o=>`<button onclick="STATE.addOccasion='${o}';render()" style="padding:3px 9px;border-radius:20px;border:1.5px solid ${STATE.addOccasion===o?"#FF6B35":"#E0E0E0"};background:${STATE.addOccasion===o?"#FF6B35":"#fff"};color:${STATE.addOccasion===o?"#fff":"#9B9B9B"};font-size:11px;font-weight:700;cursor:pointer;font-family:'Nunito',sans-serif">${o}</button>`).join("")}
      </div>
      <input id="gift-input" placeholder="e.g. BBQ tool set, nice whiskey, Traeger cookbook..." style="width:100%;border:1.5px solid #E8E0D8;border-radius:9px;padding:8px 12px;font-size:13px;color:#2C2C2C;outline:none;font-family:'Nunito Sans',sans-serif;box-sizing:border-box;background:#fff;margin-bottom:10px">
      <div style="display:flex;gap:8px;justify-content:space-between;align-items:center">
        <button onclick="generateGiftIdeas()" ${STATE.giftGenerating?"disabled":""} style="padding:6px 12px;border-radius:8px;border:none;background:${STATE.giftGenerating?"#ccc":"#9B59B6"};color:#fff;font-size:12px;font-weight:800;cursor:pointer;font-family:'Nunito',sans-serif;display:flex;align-items:center;gap:6px">
          ${STATE.giftGenerating?`<div style="width:12px;height:12px;border:2px solid rgba(255,255,255,0.4);border-top-color:#fff;border-radius:50%;animation:spin 0.7s linear infinite"></div>Thinking…`:"✨ AI suggestions"}
        </button>
        <div style="display:flex;gap:8px">
          <button onclick="STATE.giftAdding=false;render()" style="padding:6px 12px;border-radius:8px;border:1.5px solid #E0E0E0;background:#fff;font-size:12px;font-weight:600;cursor:pointer;color:#9B9B9B">Cancel</button>
          <button onclick="saveGift()" style="padding:6px 12px;border-radius:8px;border:none;background:#FF6B35;font-size:12px;font-weight:800;cursor:pointer;color:#fff;font-family:'Nunito',sans-serif">Save</button>
        </div>
      </div>
    </div>`:""}
    ${gifts.length===0&&!STATE.giftAdding?`<div style="text-align:center;padding:16px 12px;background:#FAFAFA;border-radius:12px;border:1.5px dashed #E8E0D8"><div style="font-size:20px;margin-bottom:5px">🎁</div><div style="font-size:12px;color:#9B9B9B;line-height:1.5">No gift ideas yet. Add one or let AI suggest.</div></div>`:""}
    ${Object.entries(grouped).map(([occ,items])=>`<div style="margin-bottom:12px">
      <div style="font-size:11px;font-weight:800;color:#C4B5A8;margin-bottom:6px;font-family:'Nunito',sans-serif">${occ}</div>
      ${items.map(g=>`<div style="display:flex;align-items:center;gap:10px;padding:8px 12px;border-radius:10px;background:${g.bought?"#F0FFF4":"#FAFAFA"};border:1px solid ${g.bought?"#C8E6C9":"#F0E8DF"};margin-bottom:5px">
        <input type="checkbox" ${g.bought?"checked":""} onchange="toggleGift('${c.id}','${g.id}')" style="width:15px;height:15px;cursor:pointer;accent-color:#2ECC71;flex-shrink:0">
        <span style="flex:1;font-size:13px;color:${g.bought?"#9B9B9B":"#2C2C2C"};text-decoration:${g.bought?"line-through":"none"}">${g.text.replace(/</g,"&lt;")}</span>
        <button onclick="deleteGift('${c.id}','${g.id}')" onmouseenter="this.style.color='#E74C3C'" onmouseleave="this.style.color='#D0C8C0'" style="background:none;border:none;cursor:pointer;font-size:12px;color:#D0C8C0;padding:0 2px;flex-shrink:0">✕</button>

  return `<div onclick="if(event.target===this)closeDetail()" style="position:fixed;inset:0;background:rgba(0,0,0,0.4);z-index:200;display:flex;align-items:center;justify-content:flex-end">

        <div style="flex:1">
          <div style="font-size:22px;font-weight:900;color:#2C2C2C;font-family:'Nunito',sans-serif;letter-spacing:-0.5px">${c.fname} ${c.lname}</div>
          <div style="display:flex;gap:5px;flex-wrap:wrap;margin-top:6px">${(c.tags||[]).map(tagPill).join("")}</div>

      ${isBday?`<div style="background:#FFF8E1;border:1.5px solid #FFE082;border-radius:12px;padding:12px 14px;font-weight:700;font-size:13px;color:#F57F17;font-family:'Nunito',sans-serif">🎂 ${bdu===0?"It's their birthday TODAY! 🎉":`Birthday in ${bdu} day${bdu===1?"":"s"}!`} — ${fmtBday(c.birthday)}</div>`:""}

        <div style="font-size:10px;font-weight:800;color:#9B9B9B;text-transform:uppercase;letter-spacing:1.5px;margin-bottom:8px;font-family:'Nunito',sans-serif">Info</div>
        ${[["📞",c.phone?`+${c.phone.replace(/\D/g,"")}`:"No phone saved"],["📝",c.note||"No note"],["⏱️",`Last contact: ${d===999?"Never":d+"d ago"}`],["🔔",`Nudge every ${c.nudgeDays} days`],c.birthday?["🎂",fmtBday(c.birthday)]:null].filter(Boolean).map(([icon,val])=>`<div style="display:flex;align-items:flex-start;gap:10px;padding:8px 0;border-bottom:1px solid #F0E8DF;font-size:13px;color:#555"><span style="font-size:15px;width:24px;text-align:center">${icon}</span><span>${val}</span></div>`).join("")}
      </div>
      <div style="background:${u.bg};border-radius:12px;padding:10px 14px;font-size:13px;font-weight:700;color:${u.col};font-family:'Nunito',sans-serif">${u.label}</div>
      ${draftSection}
      ${notesSection}
      ${giftsSection}
      <div style="display:flex;gap:10px;padding-top:10px;margin-top:auto">
        <button onclick="markContacted('${c.id}')" style="flex:2;padding:11px;border-radius:12px;border:none;background:#FF6B35;color:#fff;font-weight:800;font-size:14px;cursor:pointer;font-family:'Nunito',sans-serif;box-shadow:0 4px 14px #FF6B3544">✅ Mark as Contacted</button>
        <button onclick="editNudge('${c.id}')" style="flex:1;padding:11px;border-radius:12px;border:1.5px solid #E0E0E0;background:#fff;font-weight:700;font-size:13px;cursor:pointer;font-family:'Nunito',sans-serif;color:#9B9B9B">⚙️ Nudge</button>
      </div>
    </div>
  </div>`;
}

      <div style="display:flex;gap:10px">
        <button onclick="STATE.showAdd=false;render()" style="flex:1;padding:11px;border-radius:12px;border:1.5px solid #E0E0E0;background:#fff;font-weight:700;cursor:pointer;font-family:'Nunito',sans-serif;color:#9B9B9B">Cancel</button>
        <button onclick="saveNewContact()" style="flex:2;padding:11px;border-radius:12px;border:none;background:#FF6B35;color:#fff;font-weight:800;font-size:14px;cursor:pointer;font-family:'Nunito',sans-serif;box-shadow:0 4px 14px #FF6B3544">Add to Inner Circle 🔥</button>
      </div>
    </div>
  </div>`;
}

// ── Render ─────────────────────────────────────────────────
function render(){
  const root=document.getElementById("root");

  // No auth needed — render app directly

  const titles={dashboard:"Dashboard 🏠",contacts:STATE.group==="all"?"All Contacts":GROUPS.find(g=>g.id===STATE.group)?.label||"Contacts",birthdays:"Birthdays 🎂",nudges:"Who to Text 💬"};
  let viewHTML="";
  if(STATE.view==="dashboard") viewHTML=dashboardView();
  else if(STATE.view==="contacts") viewHTML=contactsView();
  else if(STATE.view==="birthdays") viewHTML=birthdaysView();
  else if(STATE.view==="nudges") viewHTML=nudgesView();

  root.innerHTML=`<div style="display:flex;height:100vh;overflow:hidden">
    ${sidebar()}
    <div style="flex:1;display:flex;flex-direction:column;overflow:hidden">
      <div style="padding:16px 24px;background:#fff;border-bottom:1px solid #F0E8DF;display:flex;align-items:center;justify-content:space-between;flex-shrink:0">
        <div style="font-size:20px;font-weight:900;font-family:'Nunito',sans-serif">${titles[STATE.view]||"Contacts"}</div>
        <button onclick="openAdd()" style="padding:8px 16px;border-radius:10px;border:none;background:#FF6B35;color:#fff;font-weight:800;font-size:13px;cursor:pointer;font-family:'Nunito',sans-serif;box-shadow:0 4px 12px #FF6B3544">+ Add Contact</button>
      </div>
      <div style="flex:1;overflow-y:auto;padding:24px">${viewHTML}</div>
    </div>
    ${STATE.detail?detailPanel():""}
    ${addModal()}
  </div>`;
}

// ── Global functions (called from HTML onclick) ───────────
window.setView=(v)=>{STATE.view=v;STATE.group="all";render();};
window.setGroup=(g)=>{STATE.group=g;STATE.view="contacts";render();};
window.openDetail=(id)=>{STATE.detail=STATE.contacts.find(c=>c.id===id)||null;STATE.draftText=null;STATE.draftLoading=false;STATE.noteAdding=false;STATE.giftAdding=false;render();};
window.closeDetail=()=>{STATE.detail=null;render();};
window.openAdd=()=>{STATE.showAdd=true;STATE.addContactColor=COLORS[0];STATE.addContactTags=[];render();};
window.markContacted=markContacted;
window.editNudge=async(id)=>{const c=STATE.contacts.find(x=>x.id===id);const val=prompt(`Nudge me every __ days for ${c.fname}:`,c.nudgeDays);if(val&&!isNaN(val))await fbUpdate(id,{nudgeDays:parseInt(val)});};
window.generateDraft=generateDraft;
window.clearDraft=()=>{STATE.draftText=null;render();};
window.copyDraft=()=>{if(STATE.draftText){navigator.clipboard.writeText(STATE.draftText);const btn=document.getElementById("copy-btn");if(btn){btn.textContent="✅ Copied!";setTimeout(()=>{if(btn)btn.textContent="📋 Copy";},2000);}}};
window.saveNote=()=>{const t=document.getElementById("note-input")?.value?.trim();if(t&&STATE.detail)addNote(STATE.detail.id,t);};
window.deleteNote=deleteNote;
window.saveGift=()=>{const t=document.getElementById("gift-input")?.value?.trim();if(t&&STATE.detail)addGift(STATE.detail.id,{id:uid(),text:t,occasion:STATE.addOccasion,bought:false,date:today()}).then(()=>{STATE.giftAdding=false;render();});};
window.generateGiftIdeas=generateGiftIdeas;
window.deleteGift=deleteGift;
window.toggleGift=toggleGift;
window.toggleAddTag=(t)=>{STATE.addContactTags=STATE.addContactTags.includes(t)?STATE.addContactTags.filter(x=>x!==t):[...STATE.addContactTags,t];render();};
window.saveNewContact=saveNewContact;
window.STATE=STATE;

render();
</script>
</body>
</html>
