<script type="module">

import { getFirestore,collection,doc,onSnapshot,setDoc,updateDoc,deleteDoc,query,serverTimestamp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const app = initializeApp({

  storageBucket:"inner-circle-crm.firebasestorage.app",

const db = getFirestore(app);
const FIXED_UID = "owner-inner-circle-crm";

const GROUPS = [{id:"all",label:"Everyone",icon:"ЁЯМР"},{id:"bbq",label:"BBQ Team",icon:"ЁЯНЦ"},{id:"friends",label:"Close Friends",icon:"ЁЯН║"},{id:"kids",label:"Kids' Parents",icon:"тЪ╜"},{id:"family",label:"Family",icon:"ЁЯПб"}];
const TAG_META = {bbq:{label:"ЁЯНЦ BBQ",bg:"#FFF3E0",col:"#E65100"},friends:{label:"ЁЯН║ Friends",bg:"#E8F5E9",col:"#2E7D32"},kids:{label:"тЪ╜ Kids",bg:"#E3F2FD",col:"#1565C0"},family:{label:"ЁЯПб Family",bg:"#FCE4EC",col:"#880E4F"},work:{label:"ЁЯТ╝ Work",bg:"#F3E5F5",col:"#6A1B9A"}};
const COLORS = ["#FF6B35","#3498DB","#2ECC71","#9B59B6","#E91E63","#F39C12","#1ABC9C"];
const OCCASIONS = ["ЁЯОВ Birthday","ЁЯОД Christmas","ЁЯОБ Holiday","ЁЯСитАНЁЯСз Father's Day","ЁЯСйтАНЁЯСз Mother's Day","ЁЯОУ Graduation","ЁЯПа Housewarming","ЁЯТН Wedding","тнР Just because"];

let S = {
  contacts:[],syncStatus:"synced",
  view:"dashboard",group:"all",
  detail:null,showAdd:false,
  addColor:COLORS[0],addTags:[],
  addOccasion:"ЁЯОВ Birthday",
  draftText:null,draftLoading:false,
  noteAdding:false,giftAdding:false,giftGenerating:false,
  showEdit:false,editColor:COLORS[0],editTags:[],showApiKey:false,search:"",
  showGroupText:false,groupTextTag:"friends",groupTextDraft:null,groupTextLoading:false,
  notifEnabled:("Notification" in window)&&Notification.permission==="granted",
  unsub:null
};

// helpers
function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2);}
function escH(s){return String(s).replace(/&/g,"&amp;").replace(/"/g,"&quot;").replace(/</g,"&lt;").replace(/>/g,"&gt;");}
function tod(){return new Date().toISOString().slice(0,10);}
function daysSince(d){if(!d)return 999;return Math.floor((Date.now()-new Date(d).getTime())/86400000);}
function dbu(b){if(!b)return null;const p=String(b).split("-");if(p.length<3)return null;const n=new Date();const t=new Date(n.getFullYear(),n.getMonth(),n.getDate());const nx=new Date(n.getFullYear(),(+p[1])-1,+p[2]);if(nx<t)nx.setFullYear(n.getFullYear()+1);return Math.round((nx-t)/86400000);}
function fmtB(b){if(!b)return null;const p=String(b).split("-");if(p.length<3)return null;return new Date(+p[0],(+p[1])-1,+p[2]).toLocaleDateString("en-US",{month:"long",day:"numeric"});}
function fmtD(iso){return new Date(iso).toLocaleDateString("en-US",{month:"short",day:"numeric",year:"numeric"});}
function ini(c){return((c.fname||"")[0]+(c.lname||"")[0]||"").toUpperCase();}
function urg(days,nudge){const r=days/nudge;if(r>=1.5)return{col:"#E74C3C",bg:"#FDECEC",label:"ЁЯЪи "+days+"d тАФ overdue"};if(r>=0.8)return{col:"#F39C12",bg:"#FEF9EC",label:"тП░ "+days+"d тАФ getting close"};return{col:"#27AE60",bg:"#EAFAF1",label:"тЬЕ "+days+"d ago"};}
function nudgeList(){return S.contacts.filter(c=>daysSince(c.lastContact)>=c.nudgeDays*0.8).sort((a,b)=>(daysSince(b.lastContact)/b.nudgeDays)-(daysSince(a.lastContact)/a.nudgeDays));}
function bdayList(){return S.contacts.filter(c=>c.birthday).map(c=>({...c,dbu:dbu(c.birthday)})).sort((a,b)=>a.dbu-b.dbu);}
function nudgeDue(c){return (c.nudgeDays||30)-daysSince(c.lastContact);}
function strength(c){
  var notes=(c.contactNotes||[]).length;
  if(!c.lastContact&&!notes)return{label:"New",emoji:"ЁЯМ▒",col:"#9B59B6",bg:"#F3E5F5",pct:20};
  var r=daysSince(c.lastContact)/(c.nudgeDays||30);
  var boost=notes>=5?0.3:notes>=2?0.15:0;
  var eff=r-boost;
  if(eff<=0.5)return{label:"Strong",emoji:"ЁЯФе",col:"#27AE60",bg:"#EAFAF1",pct:100};
  if(eff<=1.0)return{label:"Good",emoji:"ЁЯСН",col:"#2E7D32",bg:"#EAFAF1",pct:72};
  if(eff<=1.5)return{label:"Fading",emoji:"ЁЯШР",col:"#F39C12",bg:"#FEF9EC",pct:45};
  return{label:"Cold",emoji:"ЁЯе╢",col:"#E74C3C",bg:"#FDECEC",pct:22};
}
function upcomingList(){
  var items=[];
  S.contacts.forEach(function(c){
    if(c.birthday){var b=dbu(c.birthday);if(b!==null&&b<=60)items.push({type:"birthday",c:c,days:b,sort:b});}
    var due=nudgeDue(c);if(due<=14)items.push({type:"nudge",c:c,days:due,sort:Math.max(due,-30)});
  });
  return items.sort(function(a,b){return a.sort-b.sort;});
}
function cRef(id){return doc(db,"users",FIXED_UID,"contacts",id);}
function cCol(){return collection(db,"users",FIXED_UID,"contacts");}
function tagPill(tag){const m=TAG_META[tag]||{label:tag,bg:"#F3F4F6",col:"#6B7280"};return '<span style="font-size:10px;font-weight:700;padding:2px 8px;border-radius:20px;background:'+m.bg+';color:'+m.col+'">'+m.label+'</span>';}
function syncBadge(){const map={synced:{i:"тШБя╕П",l:"Synced",c:"#27AE60",b:"#EAFAF1"},saving:{i:"тП│",l:"SavingтАж",c:"#F39C12",b:"#FEF9EC"},error:{i:"тЪая╕П",l:"Error",c:"#E74C3C",b:"#FDECEC"}};const s=map[S.syncStatus]||map.synced;return '<div style="display:inline-flex;align-items:center;gap:5px;padding:4px 10px;border-radius:20px;background:'+s.b+';font-size:11px;font-weight:700;color:'+s.c+';font-family:Nunito,sans-serif">'+s.i+' '+s.l+'</div>';}

// firebase
async function fbSet(c){S.syncStatus="saving";render();try{await setDoc(cRef(c.id),{...c,_ts:serverTimestamp()});}catch(e){S.syncStatus="error";render();}}
async function fbUp(id,p){S.syncStatus="saving";render();try{await updateDoc(cRef(id),p);}catch(e){S.syncStatus="error";render();}}

// subscribe
(function start(){
  const q=query(cCol());
  S.unsub=onSnapshot(q,snap=>{
    S.contacts=snap.docs.map(d=>({id:d.id,...d.data()}));
    S.syncStatus="synced";
    if(S.detail){const u=S.contacts.find(c=>c.id===S.detail.id);if(u)S.detail=u;}
    render();
    try{maybeNotify(false);}catch(e){}
  },()=>{S.syncStatus="error";render();});
})();

// AI
function getApiKey(){return localStorage.getItem("ic_anthropic_key")||"";}
async function callAI(prompt){
  const key=getApiKey();if(!key)return null;
  try{
    const r=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json","x-api-key":key,"anthropic-version":"2023-06-01","anthropic-dangerous-client-side-api-key-access":"true"},body:JSON.stringify({model:"claude-haiku-4-5-20251001",max_tokens:200,messages:[{role:"user",content:prompt}]})});
    const d=await r.json();
    return d.content?.find(b=>b.type==="text")?.text?.trim()||null;
  }catch{return null;}
}

// actions
async function markContacted(id){await fbUp(id,{lastContact:tod()});S.detail=null;render();}
async function addNote(id,text){const c=S.contacts.find(x=>x.id===id);const n={id:uid(),date:tod(),text};const notes=[n,...(c.contactNotes||[])];await fbUp(id,{contactNotes:notes,lastContact:tod()});S.noteAdding=false;render();}
async function delNote(cid,nid){const c=S.contacts.find(x=>x.id===cid);await fbUp(cid,{contactNotes:(c.contactNotes||[]).filter(n=>n.id!==nid)});}
async function addGift(cid,g){const c=S.contacts.find(x=>x.id===cid);await fbUp(cid,{gifts:[...(c.gifts||[]),g]});}
async function delGift(cid,gid){const c=S.contacts.find(x=>x.id===cid);await fbUp(cid,{gifts:(c.gifts||[]).filter(g=>g.id!==gid)});}
async function togGift(cid,gid){const c=S.contacts.find(x=>x.id===cid);await fbUp(cid,{gifts:(c.gifts||[]).map(g=>g.id===gid?{...g,bought:!g.bought}:g)});}
async function genDraft(type){
  const c=S.detail;if(!c)return;
  S.draftLoading=true;S.draftText=null;render();
  const fb={catchup:"Hey "+c.fname+"! Been way too long. Hope everything's good with you and the fam. We need to catch up soon!",hangout:"Yo "+c.fname+"! We should get together soon тАФ cold drinks, good hangs. You in? ЁЯН║",birthday:"Happy birthday "+c.fname+"! Hope it's a great one! ЁЯОЙ",bbq:"Hey "+c.fname+"! Firing up the grill this weekend тАФ you and the family should come through! ЁЯФе"};
  const ps={catchup:"Laid-back dad texting friend "+c.fname+" to check in. Short casual warm iMessage 2-3 sentences. Background: "+(c.note||"old friend")+". Just the message.",hangout:"Fun casual text to "+c.fname+" suggesting hanging out. Chill dad energy. 2-3 sentences. Just the message.",birthday:"Short genuine birthday text to "+c.fname+". Real friend vibe. Just the message.",bbq:"Casual BBQ invite to "+c.fname+". Fun low-pressure. Just the message."};
  S.draftText=await callAI(ps[type])||fb[type];
  S.draftLoading=false;render();
}
async function genGifts(){
  const c=S.detail;if(!c)return;
  S.giftGenerating=true;render();
  const fallback=["Something personalized they'd love","Gift card to their favorite spot","A fun experience together"];
  try{
    const raw=await callAI('3 specific gift ideas for '+c.fname+' for '+S.addOccasion+'. Background: '+(c.note||"friend")+'. Under 10 words each. Return ONLY a JSON array like ["idea1","idea2","idea3"] no markdown.');
    const ideas=raw?JSON.parse(raw.replace(/```json|```/g,"").trim()):[];
    const list=ideas.length?ideas:fallback;
    const existing=S.contacts.find(x=>x.id===c.id)?.gifts||[];
    const newGifts=list.map(function(text,i){return{id:uid()+i,text:text,occasion:S.addOccasion,bought:false,date:tod()};});
    await fbUp(c.id,{gifts:[...existing,...newGifts]});
  }catch(e){
    const existing=S.contacts.find(x=>x.id===c.id)?.gifts||[];
    const newGifts=fallback.map(function(text,i){return{id:uid()+i,text:text,occasion:S.addOccasion,bought:false,date:tod()};});
    await fbUp(c.id,{gifts:[...existing,...newGifts]});
  }
  S.giftGenerating=false;S.giftAdding=false;render();
}

// тФАтФА views тФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФА
function dashView(){
  const nl=nudgeList(),bl=bdayList();
  let h='<div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;margin-bottom:16px">';
  [[S.contacts.length,"ЁЯСе","Contacts","#FFF3E0","#2C2C2C"],[nl.length,"ЁЯТм","To text","#FDECEC","#E74C3C"],[bl.filter(b=>b.dbu<=14).length,"ЁЯОВ","Bdays soon","#FFF8E1","#F39C12"]].forEach(function(x){
    h+='<div style="background:#fff;border-radius:12px;padding:14px;border:1px solid #F0E8DF;text-align:center"><div style="font-size:22px;margin-bottom:4px">'+x[1]+'</div><div style="font-size:22px;font-weight:900;color:'+x[4]+';font-family:Nunito,sans-serif">'+x[0]+'</div><div style="font-size:11px;color:#9B9B9B;font-weight:600;margin-top:2px">'+x[2]+'</div></div>';
  });
  h+='</div>';
  if(nl.length){
    h+='<div style="background:#fff;border-radius:14px;border:1px solid #F0E8DF;margin-bottom:14px;overflow:hidden"><div style="padding:12px 16px;border-bottom:1px solid #F0E8DF;display:flex;align-items:center;justify-content:space-between"><span style="font-weight:800;font-size:14px;font-family:Nunito,sans-serif">ЁЯСЛ Reach out</span><button onclick="window._sv(\'nudges\')" style="padding:4px 10px;border-radius:8px;border:1.5px solid #E0E0E0;background:#fff;font-size:12px;cursor:pointer;color:#9B9B9B">See all</button></div>';
    nl.slice(0,3).forEach(function(c){
      var d=daysSince(c.lastContact),u=urg(d===999?0:d,c.nudgeDays);
      h+='<div style="display:flex;align-items:center;gap:12px;padding:10px 16px;border-bottom:1px solid #F5F5F5"><div style="width:38px;height:38px;border-radius:50%;background:'+c.color+'22;color:'+c.color+';display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:900;flex-shrink:0">'+ini(c)+'</div><div style="flex:1"><div style="font-weight:800;font-size:14px;font-family:Nunito,sans-serif">'+c.fname+' '+c.lname+'</div><span style="font-size:11px;font-weight:700;padding:2px 7px;border-radius:20px;background:'+u.bg+';color:'+u.col+'">'+u.label+'</span></div><button onclick="window._od(\''+c.id+'\')" style="padding:6px 12px;border-radius:8px;border:none;background:#34C759;color:#fff;font-weight:800;font-size:12px;cursor:pointer">Text ЁЯТм</button></div>';
    });
    h+='</div>';
  }
  if(bl.length){
    h+='<div style="background:#fff;border-radius:14px;border:1px solid #F0E8DF;overflow:hidden;margin-bottom:14px"><div style="padding:12px 16px;border-bottom:1px solid #F0E8DF;display:flex;align-items:center;justify-content:space-between"><span style="font-weight:800;font-size:14px;font-family:Nunito,sans-serif">ЁЯОВ Birthdays</span><button onclick="window._sv(\'birthdays\')" style="padding:4px 10px;border-radius:8px;border:1.5px solid #E0E0E0;background:#fff;font-size:12px;cursor:pointer;color:#9B9B9B">See all</button></div>';
    bl.slice(0,3).forEach(function(c){
      var isToday=c.dbu===0;
      h+='<div style="display:flex;align-items:center;gap:12px;padding:10px 16px;border-bottom:1px solid #F5F5F5"><div onclick="window._od(\''+c.id+'\')" style="width:38px;height:38px;border-radius:50%;background:'+c.color+'22;color:'+c.color+';display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:900;flex-shrink:0;cursor:pointer">'+ini(c)+'</div><div onclick="window._od(\''+c.id+'\')" style="flex:1;cursor:pointer"><div style="font-weight:800;font-size:14px;font-family:Nunito,sans-serif">'+c.fname+' '+c.lname+'</div><div style="font-size:12px;color:#9B9B9B">'+fmtB(c.birthday)+'</div></div><button onclick="window._ob(\''+c.id+'\')" style="padding:6px 12px;border-radius:8px;border:none;background:'+(isToday?"#F39C12":"#FF6B35")+';color:#fff;font-weight:800;font-size:12px;cursor:pointer;flex-shrink:0">'+(isToday?"ЁЯОЙ Text!":"ЁЯОВ Text")+'</button></div>';
    });
    h+='</div>';
  }
  // BBQ planner
  var bbqCrew=S.contacts.filter(function(c){return(c.tags||[]).includes("bbq");});
  if(bbqCrew.length){
    var lastBBQ=bbqCrew.reduce(function(best,c){var d=c.lastContact||"";return d>best?d:best;},"");
    var bbqDays=lastBBQ?daysSince(lastBBQ):999;
    var overdue=bbqDays>=42;
    h+='<div style="background:'+(overdue?"#FFF3E0":"#fff")+';border-radius:14px;border:1.5px solid '+(overdue?"#FFB74D":"#F0E8DF")+';padding:14px 16px;display:flex;align-items:center;gap:12px">'
      +'<div style="font-size:28px">ЁЯФе</div>'
      +'<div style="flex:1"><div style="font-weight:800;font-size:14px;font-family:Nunito,sans-serif;color:#2C2C2C">'+(overdue?"Time for a BBQ!":"BBQ Crew")+'</div>'
      +'<div style="font-size:12px;color:#9B9B9B;margin-top:2px">'+(bbqDays===999?"Haven\'t reached out to the crew yet":overdue?"Last BBQ vibes were "+bbqDays+"d ago ЁЯСА":"Last reached out "+bbqDays+"d ago тАФ you\'re good!")+'</div></div>'
      +(overdue?'<button onclick="window._bbq()" style="padding:8px 14px;border-radius:10px;border:none;background:#FF6B35;color:#fff;font-weight:800;font-size:13px;cursor:pointer;flex-shrink:0">Draft ЁЯНЦ</button>':"")
      +'</div>';
  }
  if(!S.contacts.length){
    h='<div style="text-align:center;padding:50px 20px"><div style="font-size:48px;margin-bottom:12px">ЁЯСЛ</div><div style="font-family:Nunito,sans-serif;font-size:20px;font-weight:800;margin-bottom:8px">Welcome!</div><div style="font-size:14px;color:#9B9B9B;line-height:1.6;margin-bottom:24px">Add your BBQ crew, close friends,<br>kids\' parents тАФ whoever matters.</div><button onclick="window._oa()" style="padding:12px 24px;border-radius:12px;border:none;background:#FF6B35;color:#fff;font-weight:800;font-size:15px;cursor:pointer;font-family:Nunito,sans-serif">+ Add first contact ЁЯФе</button></div>';
  }
  return h;
}

function contactsView(){
  var list=S.group==="all"?S.contacts:S.contacts.filter(function(c){return(c.tags||[]).includes(S.group);});
  if(S.search.trim()){var q=S.search.trim().toLowerCase();list=list.filter(function(c){return(c.fname+" "+c.lname).toLowerCase().includes(q);});}
  var h='<div style="margin-bottom:12px"><input oninput="S.search=this.value;render()" value="'+escH(S.search)+'" placeholder="ЁЯФН Search contactsтАж" style="width:100%;border:1.5px solid #E8E0D8;border-radius:10px;padding:9px 14px;font-size:14px;outline:none;font-family:Nunito Sans,sans-serif;box-sizing:border-box;background:#fff"></div>';
  if(S.group!=="all"){var gm=GROUPS.find(function(g){return g.id===S.group;})||{label:"group"};h+='<button onclick="window._gt(\''+S.group+'\')" style="width:100%;padding:11px;border-radius:12px;border:none;background:#FF6B35;color:#fff;font-weight:800;font-size:14px;cursor:pointer;font-family:Nunito,sans-serif;margin-bottom:12px">ЁЯТм Text all of '+gm.label+'</button>';}
  if(!list.length)return h+'<div style="text-align:center;padding:40px;color:#9B9B9B"><div style="font-size:40px;margin-bottom:12px">ЁЯСе</div><p>'+(S.search?"No matches":"No contacts here yet!")+'</p></div>';
  h+='<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:12px">';
  list.forEach(function(c){
    var d=daysSince(c.lastContact),bd=dbu(c.birthday),u=urg(d===999?0:d,c.nudgeDays),st=strength(c);
    h+='<div style="background:#fff;border-radius:14px;padding:14px;border:1px solid #F0E8DF;cursor:pointer;position:relative;overflow:hidden"><div style="position:absolute;top:0;left:0;right:0;height:4px;background:'+c.color+'"></div><div title="'+st.label+' connection" style="position:absolute;top:10px;right:12px;font-size:14px">'+st.emoji+'</div>'

function maybeNotify(force){
  if(!("Notification" in window)||Notification.permission!=="granted")return;
  var today=tod();
  if(!force&&localStorage.getItem("ic_notif_day")===today)return;
  var bdayToday=S.contacts.filter(function(c){return c.birthday&&dbu(c.birthday)===0;});
  var overdue=S.contacts.filter(function(c){return nudgeDue(c)<0;});
  if(!bdayToday.length&&!overdue.length){if(force)alert("You're all caught up тАФ no reminders right now. We'll nudge you when someone's due. ЁЯОЙ");return;}
  localStorage.setItem("ic_notif_day",today);
  var parts=[];
  if(bdayToday.length)parts.push("ЁЯОВ "+bdayToday.map(function(c){return c.fname;}).join(", ")+(bdayToday.length>1?"'s birthdays are":"'s birthday is")+" today");
  if(overdue.length)parts.push("ЁЯСЛ "+overdue.length+" "+(overdue.length>1?"people are":"person is")+" overdue for a hello");
  try{new Notification("Inner Circle ЁЯФе",{body:parts.join("\n")});}catch(e){}
}
